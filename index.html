<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>拍照记账</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="拍照记账">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f7fa;color:#1a1a2e;padding:0;max-width:640px;margin:0 auto}
.page{display:none;padding:16px;padding-bottom:80px}
.page.active{display:block}
h1{text-align:center;font-size:22px;font-weight:700;color:#16213e;margin:20px 0 16px;display:flex;align-items:center;justify-content:center;gap:8px}
.auth-container{display:flex;flex-direction:column;justify-content:center;min-height:90vh;padding:30px 20px}
.auth-box{background:#fff;border-radius:20px;padding:30px 24px;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
.auth-box .logo{text-align:center;font-size:48px;margin-bottom:8px}
.auth-box .title{text-align:center;font-size:20px;font-weight:700;color:#16213e;margin-bottom:4px}
.auth-box .subtitle{text-align:center;font-size:14px;color:#999;margin-bottom:24px}
.auth-tabs{display:flex;margin-bottom:20px;border-radius:10px;overflow:hidden;border:1.5px solid #e0e0e0}
.auth-tab{flex:1;padding:10px;text-align:center;font-size:15px;font-weight:500;cursor:pointer;background:#fafafa;color:#999;border:none}
.auth-tab.active{background:#4361ee;color:#fff}
.auth-form{display:none;flex-direction:column;gap:14px}
.auth-form.active{display:flex}
.auth-form input{width:100%;padding:12px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:16px;font-family:inherit;background:#fafafa}
.auth-form input:focus{outline:none;border-color:#4361ee;background:#fff}
.auth-form .btn-auth{width:100%;padding:14px;background:linear-gradient(135deg,#4361ee,#3a0ca3);color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:600;cursor:pointer}
.auth-error{background:#fff0f0;color:#e63946;padding:10px 14px;border-radius:10px;font-size:14px;display:none;text-align:center}
.auth-error.show{display:block}
.auth-loading{text-align:center;color:#999;font-size:14px;padding:20px 0;display:none}
.user-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;margin:0 16px;margin-top:16px;background:#fff;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,0.04)}
.user-bar .user-email{font-size:13px;color:#666;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.user-bar .btn-logout{background:none;border:none;font-size:13px;color:#e63946;cursor:pointer;padding:4px 10px;border-radius:6px}
.form-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.06);margin:0 16px 16px}
.form-row{display:flex;gap:12px;margin-bottom:12px}
.form-group{flex:1;display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:13px;color:#666;font-weight:500}
.form-group input{padding:10px 12px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:16px;background:#fafafa;font-family:inherit;width:100%}
.form-group input:focus{outline:none;border-color:#4361ee;background:#fff}
.btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,#4361ee,#3a0ca3);color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:600;cursor:pointer}
.btn-cost-toggle{width:100%;padding:12px;background:none;border:1.5px dashed #ccc;border-radius:12px;font-size:15px;font-weight:500;color:#666;cursor:pointer;margin-top:10px}
.cost-panel{display:none;border-top:1px solid #f0f0f0;margin-top:12px;padding-top:12px}
.cost-panel.open{display:block}
.cost-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cost-header .cost-total-amount{font-size:18px;font-weight:700;color:#e63946}
.cost-btn-clear{background:none;border:none;font-size:12px;color:#bbb;cursor:pointer}
.cost-list{display:flex;flex-direction:column;gap:6px}
.cost-item{display:flex;gap:8px;align-items:center}
.cost-item input{padding:8px 10px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;background:#fafafa;font-family:inherit}
.cost-item .cost-input-desc{flex:3;width:0;min-width:0}
.cost-item .cost-input-amount{flex:1.2;width:0;min-width:0}
.cost-item .cost-btn-del{background:none;border:none;font-size:16px;color:#ccc;cursor:pointer}
.cost-add-row{margin-top:6px;padding:8px;background:none;border:1px dashed #ddd;border-radius:8px;font-size:13px;color:#999;cursor:pointer;width:100%}
.cost-list.collapsed .cost-item:nth-child(n+3){display:none}
.cost-toggle-btn{display:block;width:100%;text-align:center;padding:6px;font-size:13px;color:#999;background:none;border:none;cursor:pointer}
.stats-bar{display:flex;justify-content:space-around;background:linear-gradient(135deg,#16213e,#1a1a2e);color:#fff;border-radius:14px;padding:16px 20px;margin:0 16px 16px}
.stat-item{text-align:center}
.stat-label{font-size:12px;opacity:.7}
.stat-value{font-size:22px;font-weight:700;margin-top:2px}
.list-header{display:flex;justify-content:space-between;align-items:center;margin:0 16px 10px}
.list-header h2{font-size:16px;color:#333}
.btn-clear{background:none;border:none;font-size:13px;color:#e63946;cursor:pointer}
.date-group{margin:0 16px}
.date-group+.date-group{margin-top:12px}
.date-header{background:#fff;border-radius:12px 12px 0 0;padding:10px 16px 8px;display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600;color:#16213e;border-bottom:1px solid #f0f0f0}
.date-header .date-total{font-size:15px;color:#2d6a4f}
.date-records{background:#fff;border-radius:0 0 12px 12px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,0.05)}
.date-records .record-item{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f5f5f5}
.date-records .record-item:last-child{border-bottom:none}
.record-item .record-num{font-size:12px;color:#4361ee;font-weight:600;background:#eef1ff;padding:1px 8px;border-radius:10px}
.record-item .record-note-text{font-size:13px;color:#999;margin-left:8px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.record-item .record-price-text{font-size:16px;font-weight:700;color:#2d6a4f}
.record-item .btn-del{background:none;border:none;font-size:16px;color:#ccc;cursor:pointer;margin-left:6px}
.empty-state{text-align:center;color:#aaa;padding:40px 0;font-size:15px;margin:0 16px}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:100;overflow-y:auto;padding:20px 16px;padding-bottom:60px}
.modal-overlay.open{display:block}
.modal-content{background:#fff;border-radius:16px;padding:20px;max-width:640px;margin:20px auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-header h3{font-size:18px;color:#16213e}
.modal-close{background:none;border:none;font-size:22px;color:#999;cursor:pointer}
.text-view{font-size:14px;line-height:1.8;color:#333;white-space:pre-wrap;font-family:monospace}
.sync-bar{text-align:center;font-size:12px;color:#bbb;padding:4px 0 0;margin:0 16px}
.toolbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;padding:8px 16px;padding-bottom:max(8px,env(safe-area-inset-bottom));display:flex;gap:10px;max-width:640px;margin:0 auto;align-items:center}
.toolbar button{padding:12px;border:1.5px solid #e0e0e0;border-radius:10px;background:#fff;font-size:14px;font-weight:500;color:#333;cursor:pointer}
.toolbar .btn-small{padding:8px 10px;font-size:12px;flex:0 0 auto;color:#4361ee;border-color:#4361ee}
.toolbar .btn-text{flex:1;color:#2d6a4f;border-color:#2d6a4f}
</style>
</head>
<body>

<div id="authPage" class="page active">
  <div class="auth-container">
    <div class="auth-box">
      <div class="logo">📸</div>
      <div class="title">拍照记账</div>
      <div class="subtitle">登录后数据自动同步到云端</div>
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuth('login')">登录</button>
        <button class="auth-tab" onclick="switchAuth('register')">注册</button>
      </div>
      <form class="auth-form active" id="loginForm" onsubmit="return doLogin(event)">
        <div class="auth-error" id="loginError"></div>
        <input type="email" id="loginEmail" placeholder="邮箱" required>
        <input type="password" id="loginPassword" placeholder="密码" required>
        <button class="btn-auth" id="loginBtn">登录</button>
        <div class="auth-loading" id="loginLoading">登录中...</div>
      </form>
      <form class="auth-form" id="registerForm" onsubmit="return doRegister(event)">
        <div class="auth-error" id="registerError"></div>
        <div class="auth-success" id="registerSuccess" style="display:none;text-align:center;color:#2d6a4f;padding:14px 0;background:#edf7f0;border-radius:10px">✅ 注册成功！请登录</div>
        <input type="email" id="regEmail" placeholder="邮箱" required>
        <input type="password" id="regPassword" placeholder="密码（至少6位）" required>
        <button class="btn-auth" id="registerBtn">注册</button>
        <div class="auth-loading" id="registerLoading">注册中...</div>
      </form>
    </div>
  </div>
</div>

<div id="appPage" class="page">
  <div class="user-bar">
    <span class="user-email" id="userEmail"></span>
    <button class="btn-logout" onclick="doLogout()">退出</button>
  </div>
  <div class="form-card" style="margin-top:12px">
    <div class="form-row">
      <div class="form-group"><label>📅 日期</label><input type="date" id="inputDate"></div>
      <div class="form-group"><label>💰 价钱（元）</label><input type="number" id="inputPrice" placeholder="这单多少钱" min="0" step="0.01"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>📝 备注 <span style="color:#aaa;font-weight:400">（可选）</span></label><input type="text" id="inputNote" placeholder="比如：张三、婚礼跟拍..."></div>
    </div>
    <button class="btn-submit" onclick="addRecord()">➕ 记一单</button>
    <button class="btn-cost-toggle" id="costToggle" onclick="toggleCost()">💰 成本</button>
    <div class="cost-panel" id="costPanel">
      <div class="cost-header">
        <span>总成本</span>
        <span><button class="cost-btn-clear" onclick="clearCosts()">清空</button> <span class="cost-total-amount" id="costTotal">0.00</span> 元</span>
      </div>
      <div class="cost-list" id="costList"></div>
      <button class="cost-add-row" onclick="addCostItem()">➕ 添加一项</button>
    </div>
  </div>
  <div class="sync-bar" id="syncBar">☁️ 数据已同步到云端</div>
  <div class="stats-bar">
    <div class="stat-item"><div class="stat-label">总单数</div><div class="stat-value" id="totalCount">0</div></div>
    <div class="stat-item"><div class="stat-label">总金额（元）</div><div class="stat-value" id="grandTotal">0.00</div></div>
  </div>
  <div class="list-header">
    <h2>📋 每单明细</h2>
    <button class="btn-clear" onclick="clearAllRecords()">清空</button>
  </div>
  <div id="recordContainer"></div>
</div>

<div class="modal-overlay" id="textModal" onclick="if(event.target===this)closeText()">
  <div class="modal-content">
    <div class="modal-header"><h3>📄 账本文本形式</h3><button class="modal-close" onclick="closeText()">✕</button></div>
    <div class="text-view" id="textViewContent"></div>
  </div>
</div>

<div class="toolbar" id="toolbar" style="display:none">
  <button class="btn-small" onclick="doImport()">📥导入</button>
  <button class="btn-text" onclick="showTextView()">📄 查看文本形式</button>
</div>

<script>
// ====== Supabase 配置 ======
const SB_URL = 'https://ekqbzemiumadjknhqhfm.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVrcWJ6ZW1pdW1hZGprbmhxaGZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NTM5OTEsImV4cCI6MjA5NjEyOTk5MX0.7im4Y2tEypBVCriHqwf5-S91m-b6AwmDMumc2cu0Vsc';
const REST = SB_URL + '/rest/v1';
const AUTH = SB_URL + '/auth/v1';

// ====== 状态 ======
let currentUser = null;
let token = null;
let records = [];
let costs = [];
let costExpanded = false;
let costOpen = false;
let costTimers = {};

// ====== 工具函数 ======
function q(id) { return document.getElementById(id); }

function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  q(pageId).classList.add('active');
  q('toolbar').style.display = pageId === 'appPage' ? 'flex' : 'none';
}

function setSync(v) { q('syncBar').textContent = v ? '⏳ 同步中...' : '☁️ 数据已同步到云端'; }

function authHeaders() {
  const h = { 'apikey': SB_KEY, 'Content-Type': 'application/json' };
  if (token) h['Authorization'] = 'Bearer ' + token;
  return h;
}

async function api(method, url, body) {
  const opt = { method, headers: authHeaders() };
  if (body) opt.body = JSON.stringify(body);
  const r = await fetch(url, opt);
  if (r.status === 204) return null;
  const d = await r.json();
  if (!r.ok) throw new Error(d.message || d.error_description || d.msg || '请求失败');
  return d;
}

// ====== 日期排序 ======
function dateKey(d) {
  if (!d) return '9999-99-99';
  let m = d.match(/^(\d{4})[-/\.](\d{1,2})[-/\.](\d{1,2})/);
  if (m) return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
  m = d.match(/^(\d{4})[-/\.](\d{1,2})/);
  if (m) return m[1]+'-'+m[2].padStart(2,'0')+'-00';
  return d;
}

// ====== 登录页切换 ======
function switchAuth(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
  document.querySelectorAll('.auth-error').forEach(e => e.classList.remove('show'));
  q('registerSuccess').style.display = 'none';
  if (tab === 'login') {
    document.querySelector('.auth-tab[onclick*="login"]').classList.add('active');
    q('loginForm').classList.add('active');
  } else {
    document.querySelector('.auth-tab[onclick*="register"]').classList.add('active');
    q('registerForm').classList.add('active');
  }
}

function showAuthError(form, msg) {
  q(form + 'Error').textContent = msg;
  q(form + 'Error').classList.add('show');
}

// ====== 登录 ======
async function doLogin(e) {
  e.preventDefault();
  q('loginBtn').disabled = true;
  q('loginLoading').style.display = 'block';
  q('loginError').classList.remove('show');

  try {
    const d = await api('POST', AUTH + '/token?grant_type=password', {
      email: q('loginEmail').value.trim(),
      password: q('loginPassword').value
    });
    currentUser = d.user;
    token = d.access_token;
    localStorage.setItem('sb_token', d.access_token);
    localStorage.setItem('sb_user', JSON.stringify(d.user));
    showApp();
  } catch(err) {
    showAuthError('login', err.message.includes('Invalid login credentials') ? '邮箱或密码错误' : err.message);
  }
  q('loginBtn').disabled = false;
  q('loginLoading').style.display = 'none';
}

// ====== 注册 ======
async function doRegister(e) {
  e.preventDefault();
  q('registerBtn').disabled = true;
  q('registerLoading').style.display = 'block';
  q('registerError').classList.remove('show');
  q('registerSuccess').style.display = 'none';

  const email = q('regEmail').value.trim();
  const password = q('regPassword').value;
  if (password.length < 6) { showAuthError('register', '密码至少6位'); q('registerBtn').disabled = false; q('registerLoading').style.display = 'none'; return; }

  try {
    await api('POST', AUTH + '/signup', { email, password });
    q('registerSuccess').style.display = 'block';
    q('registerBtn').textContent = '注册成功 ✓';
  } catch(err) {
    showAuthError('register', err.message);
  }
  q('registerBtn').disabled = false;
  q('registerLoading').style.display = 'none';
}

// ====== 退出 ======
async function doLogout() {
  try { await api('POST', AUTH + '/logout'); } catch(e) {}
  currentUser = null;
  token = null;
  localStorage.removeItem('sb_token');
  localStorage.removeItem('sb_user');
  showPage('authPage');
}

// ====== 进入 App ======
async function showApp() {
  showPage('appPage');
  q('userEmail').textContent = currentUser.email;
  q('inputDate').value = new Date().toISOString().slice(0, 10);
  await loadData();
}

// ====== 加载数据 ======
async function loadData() {
  setSync(true);
  try {
    const [recs, csts] = await Promise.all([
      api('GET', REST + '/records?user_id=eq.' + currentUser.id + '&order=created_at.asc'),
      api('GET', REST + '/costs?user_id=eq.' + currentUser.id + '&order=created_at.asc')
    ]);
    records = recs || [];
    costs = csts || [];
    renderRecords();
    renderCosts();
    setSync(false);
  } catch(e) {
    q('syncBar').textContent = '⚠️ ' + e.message;
  }
}

// ====== 渲染记录 ======
function renderRecords() {
  const container = q('recordContainer');
  if (!records.length) {
    container.innerHTML = '<div class="empty-state">还没有记录，记第一单吧 ✍️</div>';
    q('totalCount').textContent = '0';
    q('grandTotal').textContent = '0.00';
    return;
  }

  const sorted = [...records].sort((a,b) => dateKey(a.date) > dateKey(b.date) ? 1 : -1);
  const groups = {};
  sorted.forEach((r, i) => {
    const d = r.date || '未知日期';
    if (!groups[d]) groups[d] = [];
    groups[d].push({ ...r, seq: i + 1 });
  });

  let grandTotal = 0;
  let html = '';
  const dateList = Object.keys(groups).sort((a,b) => dateKey(a) > dateKey(b) ? 1 : -1);

  dateList.forEach(date => {
    const items = groups[date];
    let dayTotal = 0;
    items.forEach(r => { dayTotal += parseFloat(r.price) || 0; grandTotal += parseFloat(r.price) || 0; });
    html += `<div class="date-group"><div class="date-header"><span>📅 ${date}</span><span class="date-total">${dayTotal.toFixed(2)} 元</span></div><div class="date-records">`;
    items.forEach(r => {
      const p = parseFloat(r.price) || 0;
      const note = r.note ? `<span class="record-note-text">📌 ${r.note}</span>` : '';
      html += `<div class="record-item"><div><span class="record-num">第 ${r.seq} 单</span>${note}</div><div><span class="record-price-text">${p.toFixed(2)} 元</span><button class="btn-del" onclick="delRecord('${r.id}')">✕</button></div></div>`;
    });
    html += `</div></div>`;
  });

  container.innerHTML = html;
  q('totalCount').textContent = records.length;
  q('grandTotal').textContent = grandTotal.toFixed(2);
}

async function delRecord(id) {
  if (!confirm('确定删除？')) return;
  await api('DELETE', REST + '/records?id=eq.' + id);
  records = records.filter(r => r.id !== id);
  renderRecords();
}

// ====== 新增记账 ======
async function addRecord() {
  const date = q('inputDate').value;
  const price = q('inputPrice').value;
  const note = q('inputNote').value.trim();
  if (!date) { alert('请选择日期'); return; }
  if (!price || parseFloat(price) <= 0) { alert('请输入有效的价钱'); return; }

  const d = await api('POST', REST + '/records', { user_id: currentUser.id, date, price: parseFloat(price), note });
  records.push(d);
  renderRecords();
  q('inputPrice').value = '';
  q('inputNote').value = '';
  q('inputPrice').focus();
}

// ====== 成本 ======
function toggleCost() {
  costOpen = !costOpen;
  q('costPanel').classList.toggle('open', costOpen);
  q('costToggle').classList.toggle('open', costOpen);
  q('costToggle').textContent = costOpen ? '💰 收起成本' : '💰 成本';
}

async function addCostItem() {
  const d = await api('POST', REST + '/costs', { user_id: currentUser.id, description: '', amount: 0 });
  costs.push(d);
  renderCosts();
  const items = document.querySelectorAll('.cost-item');
  if (items.length) items[items.length-1].querySelector('.cost-input-desc').focus();
}

async function clearCosts() {
  if (!confirm('确定清空所有成本项？')) return;
  for (const c of costs) await api('DELETE', REST + '/costs?id=eq.' + c.id);
  costs = []; renderCosts();
}

function renderCosts() {
  const el = q('costList');
  let total = 0;
  costs.forEach(c => { total += parseFloat(c.amount) || 0; });
  q('costTotal').textContent = total.toFixed(2);
  if (!costs.length) { el.innerHTML = ''; return; }

  const st = costs.length > 2;
  el.innerHTML = costs.map(c => {
    const a = parseFloat(c.amount) || 0;
    const desc = escHtml(c.description);
    return `<div class="cost-item"><input class="cost-input-desc" type="text" value="${desc}" placeholder="成本项目" data-cid="${c.id}" data-field="desc" oninput="costEdit(this)"><input class="cost-input-amount" type="number" value="${a||''}" placeholder="金额" min="0" step="0.01" data-cid="${c.id}" data-field="amount" oninput="costEdit(this)"><button class="cost-btn-del" onclick="delCost('${c.id}')">✕</button></div>`;
  }).join('');

  if (st) {
    el.classList.add('collapsed');
    if (costExpanded) el.classList.remove('collapsed');
    const tb = document.createElement('button');
    tb.className = 'cost-toggle-btn';
    tb.textContent = costExpanded ? '▲ 收起' : `▼ 展开全部（共 ${costs.length} 项）`;
    tb.onclick = () => { costExpanded = !costExpanded; renderCosts(); };
    el.appendChild(tb);
  } else { el.classList.remove('collapsed'); costExpanded = false; }
}

function costEdit(inp) {
  const cid = inp.dataset.cid, field = inp.dataset.field;
  const cost = costs.find(c => c.id === cid);
  if (!cost) return;
  if (field === 'amount') cost.amount = parseFloat(inp.value) || 0;
  else cost.description = inp.value;
  let t = 0; costs.forEach(c => { t += parseFloat(c.amount) || 0; });
  q('costTotal').textContent = t.toFixed(2);
  clearTimeout(costTimers[cid]);
  costTimers[cid] = setTimeout(async () => {
    try { await api('PATCH', REST + '/costs?id=eq.' + cid, { [field]: cost[field] }); } catch(e) {}
  }, 1000);
}

async function delCost(id) {
  await api('DELETE', REST + '/costs?id=eq.' + id);
  costs = costs.filter(c => c.id !== id);
  renderCosts();
}

// ====== 清空全部 ======
async function clearAllRecords() {
  if (!confirm('确定清空全部记录？')) return;
  for (const r of records) await api('DELETE', REST + '/records?id=eq.' + r.id);
  records = []; renderRecords();
}

// ====== 文本查看 ======
function showTextView() {
  let txt = '=== 拍照记账 ===\n';
  if (costs.length) {
    txt += '\n--- 成本 ---\n';
    let ct = 0;
    costs.forEach(c => { const a=parseFloat(c.amount)||0; ct+=a; txt += `  ${c.description||'(未命名)'}：${a.toFixed(2)}元\n`; });
    txt += `  成本合计：${ct.toFixed(2)}元\n`;
  }
  let gt = 0;
  records.forEach(r => { gt += parseFloat(r.price) || 0; });
  txt += `\n总单数：${records.length}\n总金额：${gt.toFixed(2)} 元\n\n`;

  const sorted = [...records].sort((a,b) => dateKey(a.date) > dateKey(b.date) ? 1 : -1);
  const groups = {};
  sorted.forEach((r, i) => {
    const d = r.date || '未知日期';
    if (!groups[d]) groups[d] = [];
    groups[d].push({ ...r, seq: i + 1 });
  });
  const dl = Object.keys(groups).sort((a,b) => dateKey(a) > dateKey(b) ? 1 : -1);

  dl.forEach(date => {
    const items = groups[date];
    let dt = 0;
    items.forEach(r => { dt += parseFloat(r.price) || 0; });
    txt += `📅 ${date}  —  ${dt.toFixed(2)}元\n`;
    items.forEach(r => {
      txt += `  第${r.seq}单  ${(parseFloat(r.price)||0).toFixed(2)}元`;
      if (r.note) txt += `  📌 ${r.note}`;
      txt += '\n';
    });
  });

  q('textViewContent').textContent = txt;
  q('textModal').classList.add('open');
}

function closeText() { q('textModal').classList.remove('open'); }

// ====== 导入 ======
async function doImport() {
  const text = prompt('粘贴旧账本数据（一行一条）：\n\n格式示例：\n2026/03/17-第1单-金额：50.\n2026/03~05-第2单-金额：50.\n2026-01-01 100 张三');
  if (!text || !text.trim()) return;

  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length);
  const newItems = [];

  lines.forEach(line => {
    if (/^(日期|date|单价|小计|合计|━━|===|#)/i.test(line)) return;
    if (/^[─═━=]+$/.test(line)) return;

    let date = '', price = 0, note = '', m;

    m = line.match(/^(\S+?)\s*-\s*第\d+单\s*-\s*金额[：:]\s*(\d+(?:\.\d+)?)\s*\.?\s*$/);
    if (m) { date = m[1]; price = parseFloat(m[2]); }
    else {
      m = line.match(/^(\S+?)\s*-\s*第\d+单\s*-\s*金额[：:]\s*(\d+(?:\.\d+)?)\s*\.?\s*-\s*(.+)$/);
      if (m) { date = m[1]; price = parseFloat(m[2]); note = m[3].trim(); }
      else {
        m = line.match(/^(\d{4}[-/\.]\d{1,2}[-/\.]\d{1,2})\s+(\d+(?:\.\d+)?)\s*(.*?)$/);
        if (m) { date = m[1].replace(/[-/\.]/g,'-').replace(/(\d{4})-(\d{1,2})-(\d{1,2})/,'$1-'+('$2').padStart(2,'0')+'-'+('$3').padStart(2,'0')); price = parseFloat(m[2]); note = m[3].trim(); }
        else {
          m = line.match(/^(\d{4}[-/\.]\d{1,2}[-/\.]\d{1,2})\s*[,，]\s*(\d+(?:\.\d+)?)\s*(?:[,，]\s*(.*?))?$/);
          if (m) { date = m[1]; price = parseFloat(m[2]); note = (m[3]||'').trim(); }
        }
      }
    }

    if (date && price > 0) { newItems.push({ date, price, note }); }
  });

  if (!newItems.length) { alert('未能识别出有效数据。'); return; }

  setSync(true);
  try {
    for (const item of newItems) {
      const d = await api('POST', REST + '/records', { user_id: currentUser.id, date: item.date, price: item.price, note: item.note || '' });
      records.push(d);
    }
    records.sort((a,b) => dateKey(a.date) > dateKey(b.date) ? 1 : -1);
    renderRecords();
    alert('✅ 成功导入 ' + newItems.length + ' 条记录！');
  } catch(e) { q('syncBar').textContent = '⚠️ ' + e.message; }
  setSync(false);
}

function escHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ====== 回车提交 ======
document.addEventListener('DOMContentLoaded', function() {
  q('inputDate').value = new Date().toISOString().slice(0, 10);
  q('inputPrice').addEventListener('keydown', e => { if (e.key === 'Enter') addRecord(); });
  q('inputNote').addEventListener('keydown', e => { if (e.key === 'Enter') addRecord(); });

  // 检查登录状态
  const savedToken = localStorage.getItem('sb_token');
  const savedUser = localStorage.getItem('sb_user');
  if (savedToken && savedUser) {
    token = savedToken;
    currentUser = JSON.parse(savedUser);
    showApp();
  }
});
</script>
