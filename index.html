<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>拍照记账</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="拍照记账">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f5f7fa;
  color: #1a1a2e; padding: 0;
  max-width: 640px; margin: 0 auto;
}
.page { display: none; padding: 16px; padding-bottom: 80px; }
.page.active { display: block; }
h1 { text-align: center; font-size: 22px; font-weight: 700; color: #16213e; margin: 20px 0 16px; display: flex; align-items: center; justify-content: center; gap: 8px; }

/* ====== 登录页 ====== */
.auth-container { display: flex; flex-direction: column; justify-content: center; min-height: 90vh; padding: 30px 20px; }
.auth-box { background: #fff; border-radius: 20px; padding: 30px 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
.auth-box .logo { text-align: center; font-size: 48px; margin-bottom: 8px; }
.auth-box .title { text-align: center; font-size: 20px; font-weight: 700; color: #16213e; margin-bottom: 4px; }
.auth-box .subtitle { text-align: center; font-size: 14px; color: #999; margin-bottom: 24px; }
.auth-tabs { display: flex; gap: 0; margin-bottom: 20px; border-radius: 10px; overflow: hidden; border: 1.5px solid #e0e0e0; }
.auth-tab { flex:1; padding:10px; text-align:center; font-size:15px; font-weight:500; cursor:pointer; background:#fafafa; color:#999; border:none; }
.auth-tab.active { background: #4361ee; color: #fff; }
.auth-form { display: none; flex-direction: column; gap: 14px; }
.auth-form.active { display: flex; }
.auth-form input { width:100%; padding:12px 14px; border:1.5px solid #e0e0e0; border-radius:10px; font-size:16px; font-family:inherit; background:#fafafa; }
.auth-form input:focus { outline:none; border-color:#4361ee; background:#fff; }
.auth-form .btn-auth { width:100%; padding:14px; background:linear-gradient(135deg,#4361ee,#3a0ca3); color:#fff; border:none; border-radius:12px; font-size:17px; font-weight:600; cursor:pointer; }
.auth-form .btn-auth:active { transform:scale(0.98); opacity:0.85; }
.auth-form .btn-auth:disabled { opacity:0.5; }
.auth-error { background:#fff0f0; color:#e63946; padding:10px 14px; border-radius:10px; font-size:14px; display:none; text-align:center; }
.auth-error.show { display:block; }
.auth-loading { text-align:center; color:#999; font-size:14px; padding:20px 0; }
.auth-success { text-align:center; color:#2d6a4f; font-size:15px; padding:14px 0; background:#edf7f0; border-radius:10px; display:none; }
.auth-success.show { display:block; }

/* ====== 用户栏 ====== */
.user-bar { display:flex; justify-content:space-between; align-items:center; padding:10px 16px; margin:0 16px; margin-top:16px; background:#fff; border-radius:12px; box-shadow:0 1px 6px rgba(0,0,0,0.04); }
.user-bar .user-email { font-size:13px; color:#666; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
.user-bar .btn-logout { background:none; border:none; font-size:13px; color:#e63946; cursor:pointer; padding:4px 10px; border-radius:6px; flex-shrink:0; }

/* ====== 表单 ====== */
.form-card { background:#fff; border-radius:16px; padding:20px; box-shadow:0 2px 12px rgba(0,0,0,0.06); margin:0 16px 16px; }
.form-row { display:flex; gap:12px; margin-bottom:12px; }
.form-row:last-child { margin-bottom:0; }
.form-group { flex:1; display:flex; flex-direction:column; gap:4px; }
.form-group label { font-size:13px; color:#666; font-weight:500; }
.form-group input { padding:10px 12px; border:1.5px solid #e0e0e0; border-radius:10px; font-size:16px; background:#fafafa; font-family:inherit; width:100%; }
.form-group input:focus { outline:none; border-color:#4361ee; background:#fff; }
.btn-submit { width:100%; padding:14px; background:linear-gradient(135deg,#4361ee,#3a0ca3); color:#fff; border:none; border-radius:12px; font-size:17px; font-weight:600; cursor:pointer; }
.btn-submit:active { transform:scale(0.98); opacity:0.85; }
.btn-cost-toggle { width:100%; padding:12px; background:none; border:1.5px dashed #ccc; border-radius:12px; font-size:15px; font-weight:500; color:#666; cursor:pointer; margin-top:10px; }
.btn-cost-toggle:hover { border-color:#e63946; color:#e63946; background:#fff5f5; }
.btn-cost-toggle.open { border-color:#e63946; background:#fff5f5; color:#e63946; }
.cost-panel { display:none; margin-top:0; border-top:none; padding-top:0; }
.cost-panel.open { display:block; margin-top:12px; padding-top:12px; border-top:1px solid #f0f0f0; }
.cost-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; padding:0 2px; }
.cost-header .cost-total-label { font-size:14px; color:#333; font-weight:500; }
.cost-header .cost-total-amount { font-size:18px; font-weight:700; color:#e63946; }
.cost-btn-clear { background:none; border:none; font-size:12px; color:#bbb; cursor:pointer; padding:2px 6px; }
.cost-list { display:flex; flex-direction:column; gap:6px; }
.cost-item { display:flex; gap:8px; align-items:center; }
.cost-item input { padding:8px 10px; border:1.5px solid #e0e0e0; border-radius:8px; font-size:14px; background:#fafafa; font-family:inherit; }
.cost-item input:focus { outline:none; border-color:#e63946; background:#fff; }
.cost-item .cost-input-desc { flex:3; width:0; min-width:0; }
.cost-item .cost-input-amount { flex:1.2; width:0; min-width:0; }
.cost-item .cost-btn-del { background:none; border:none; font-size:16px; color:#ccc; cursor:pointer; padding:0 2px; flex-shrink:0; }
.cost-add-row { margin-top:6px; padding:8px; background:none; border:1px dashed #ddd; border-radius:8px; font-size:13px; color:#999; cursor:pointer; width:100%; }
.cost-list.collapsed .cost-item:nth-child(n+3) { display:none; }
.cost-toggle-btn { display:block; width:100%; text-align:center; padding:6px; font-size:13px; color:#999; background:none; border:none; cursor:pointer; margin-top:2px; }

/* ====== 统计 ====== */
.stats-bar { display:flex; justify-content:space-around; background:linear-gradient(135deg,#16213e,#1a1a2e); color:#fff; border-radius:14px; padding:16px 20px; margin:0 16px 16px; }
.stat-item { text-align:center; }
.stat-label { font-size:12px; opacity:0.7; }
.stat-value { font-size:22px; font-weight:700; margin-top:2px; }

/* ====== 按日期分组列表 ====== */
.list-header { display:flex; justify-content:space-between; align-items:center; margin:0 16px 10px; }
.list-header h2 { font-size:16px; color:#333; }
.btn-clear { background:none; border:none; font-size:13px; color:#e63946; cursor:pointer; padding:4px 8px; border-radius:6px; }
.date-group { margin:0 16px; }
.date-group + .date-group { margin-top:12px; }
.date-header {
  background:#fff; border-radius:12px 12px 0 0; padding:10px 16px 8px;
  display:flex; justify-content:space-between; align-items:center;
  font-size:14px; font-weight:600; color:#16213e; border-bottom:1px solid #f0f0f0;
}
.date-header .date-label { display:flex; align-items:center; gap:4px; }
.date-header .date-total { font-size:15px; color:#2d6a4f; }
.date-records { background:#fff; border-radius:0 0 12px 12px; overflow:hidden; box-shadow:0 1px 6px rgba(0,0,0,0.05); }
.date-records .record-item {
  padding:10px 16px; display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid #f5f5f5;
}
.date-records .record-item:last-child { border-bottom:none; }
.record-item .record-num { font-size:12px; color:#4361ee; font-weight:600; background:#eef1ff; padding:1px 8px; border-radius:10px; }
.record-item .record-note-text { font-size:13px; color:#999; margin-left:8px; max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.record-item .record-price-text { font-size:16px; font-weight:700; color:#2d6a4f; }
.record-item .btn-del { background:none; border:none; font-size:16px; color:#ccc; cursor:pointer; padding:0 4px; margin-left:6px; }
.empty-state { text-align:center; color:#aaa; padding:40px 0; font-size:15px; margin:0 16px; }

/* ====== 文本查看弹窗 ====== */
.modal-overlay {
  display:none; position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.4); z-index:100; overflow-y:auto;
  padding:20px 16px; padding-bottom:60px;
}
.modal-overlay.open { display:block; }
.modal-content { background:#fff; border-radius:16px; padding:20px; max-width:640px; margin:20px auto; }
.modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.modal-header h3 { font-size:18px; color:#16213e; }
.modal-close { background:none; border:none; font-size:22px; color:#999; cursor:pointer; }
.text-view { font-size:14px; line-height:1.8; color:#333; white-space:pre-wrap; font-family:monospace; }

/* ====== 同步 ====== */
.sync-bar { text-align:center; font-size:12px; color:#bbb; padding:4px 0 0; margin:0 16px; }
.sync-bar.syncing { color:#4361ee; }
.sync-bar.error { color:#e63946; }

/* ====== 底部工具栏 ====== */
.toolbar {
  position:fixed; bottom:0; left:0; right:0;
  background:#fff; border-top:1px solid #eee;
  padding:8px 16px; padding-bottom:max(8px,env(safe-area-inset-bottom));
  display:flex; gap:10px; max-width:640px; margin:0 auto; align-items:center;
}
.toolbar button {
  padding:12px; border:1.5px solid #e0e0e0; border-radius:10px;
  background:#fff; font-size:14px; font-weight:500; color:#333; cursor:pointer;
}
.toolbar button:active { background:#f5f5f5; }
.toolbar .btn-small {
  padding:8px 10px; font-size:12px; flex:0 0 auto;
  color:#4361ee; border-color:#4361ee;
}
.toolbar .btn-text {
  flex:1; color:#2d6a4f; border-color:#2d6a4f;
}
</style>
</head>
<body>

<!-- ====== 登录页 ====== -->
<div id="authPage" class="page active">
  <div class="auth-container">
    <div class="auth-box">
      <div class="logo">📸</div>
      <div class="title">拍照记账</div>
      <div class="subtitle">登录后数据自动同步到云端</div>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">登录</button>
        <button class="auth-tab" data-tab="register">注册</button>
      </div>
      <form class="auth-form active" id="loginForm">
        <div class="auth-error" id="loginError"></div>
        <input type="email" id="loginEmail" placeholder="邮箱" required>
        <input type="password" id="loginPassword" placeholder="密码（至少6位）" required>
        <button class="btn-auth" id="loginBtn">登录</button>
        <div class="auth-loading" id="loginLoading" style="display:none;">登录中...</div>
      </form>
      <form class="auth-form" id="registerForm">
        <div class="auth-error" id="registerError"></div>
        <div class="auth-success" id="registerSuccess">✅ 注册成功！正在登录...</div>
        <input type="email" id="regEmail" placeholder="邮箱" required>
        <input type="password" id="regPassword" placeholder="密码（至少6位）" required>
        <button class="btn-auth" id="registerBtn">注册</button>
        <div class="auth-loading" id="registerLoading" style="display:none;">注册中...</div>
      </form>
    </div>
  </div>
</div>

<!-- ====== 记账 App ====== -->
<div id="appPage" class="page">
  <div class="user-bar">
    <span class="user-email" id="userEmail"></span>
    <button class="btn-logout" id="logoutBtn">退出</button>
  </div>

  <div class="form-card" style="margin-top:12px;">
    <div class="form-row">
      <div class="form-group">
        <label>📅 日期</label>
        <input type="date" id="inputDate">
      </div>
      <div class="form-group">
        <label>💰 价钱（元）</label>
        <input type="number" id="inputPrice" placeholder="这单多少钱" min="0" step="0.01">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>📝 备注 <span style="color:#aaa;font-weight:400;">（可选）</span></label>
        <input type="text" id="inputNote" placeholder="比如：张三、婚礼跟拍...">
      </div>
    </div>
    <button class="btn-submit" id="btnAdd">➕ 记一单</button>

    <button class="btn-cost-toggle" id="btnCostToggle">💰 成本</button>
    <div class="cost-panel" id="costPanel">
      <div class="cost-header">
        <span class="cost-total-label">总成本</span>
        <span><button class="cost-btn-clear" id="costClearBtn">清空</button><span class="cost-total-amount" id="costTotal">0.00</span> 元</span>
      </div>
      <div class="cost-list" id="costList"></div>
      <button class="cost-add-row" id="costAddBtn">➕ 添加一项</button>
    </div>
  </div>

  <div class="sync-bar" id="syncBar">☁️ 数据已同步到云端</div>

  <div class="stats-bar">
    <div class="stat-item"><div class="stat-label">总单数</div><div class="stat-value" id="totalCount">0</div></div>
    <div class="stat-item"><div class="stat-label">总金额（元）</div><div class="stat-value" id="grandTotal">0.00</div></div>
  </div>

  <div class="list-header">
    <h2>📋 每单明细</h2>
    <button class="btn-clear" id="btnClearAll">清空</button>
  </div>
  <div id="recordContainer"></div>
</div>

<!-- ====== 文本查看弹窗 ====== -->
<div class="modal-overlay" id="textModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>📄 账本文本形式</h3>
      <button class="modal-close" id="textModalClose">✕</button>
    </div>
    <div class="text-view" id="textViewContent"></div>
  </div>
</div>

<!-- ====== 底部工具栏 ====== -->
<div class="toolbar" id="toolbar" style="display:none;">
  <button class="btn-small" id="btnImport">📥导入</button>
  <button class="btn-text" id="btnTextView">📄 查看文本形式</button>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.49.4';

const SUPABASE_URL = 'https://ekqbzemiumadjknhqhfm.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVrcWJ6ZW1pdW1hZGprbmhxaGZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NTM5OTEsImV4cCI6MjA5NjEyOTk5MX0.7im4Y2tEypBVCriHqwf5-S91m-b6AwmDMumc2cu0Vsc';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const authPage = document.getElementById('authPage');
const appPage = document.getElementById('appPage');
const toolbar = document.getElementById('toolbar');
const userEmail = document.getElementById('userEmail');
const syncBar = document.getElementById('syncBar');

let currentUser = null;

function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  page.classList.add('active');
  toolbar.style.display = page === appPage ? 'flex' : 'none';
}

// ====== 认证 ======
document.querySelectorAll('.auth-tab').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    document.getElementById(this.dataset.tab + 'Form').classList.add('active');
    document.querySelectorAll('.auth-error').forEach(e => e.classList.remove('show'));
    document.querySelectorAll('.auth-success').forEach(s => s.classList.remove('show'));
  });
});

function setLoading(f, v) { document.getElementById(f+'Btn').disabled = v; document.getElementById(f+'Loading').style.display = v ? 'block' : 'none'; }
function showError(f, m) { const e=document.getElementById(f+'Error'); e.textContent=m; e.classList.add('show'); }

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  setLoading('login', true);
  document.getElementById('loginError').classList.remove('show');
  const { error } = await supabase.auth.signInWithPassword({ email: document.getElementById('loginEmail').value.trim(), password: document.getElementById('loginPassword').value });
  setLoading('login', false);
  if (error) showError('login', error.message.includes('Invalid login credentials') ? '邮箱或密码错误' : error.message);
});

document.getElementById('registerForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  setLoading('register', true);
  document.getElementById('registerError').classList.remove('show');
  document.getElementById('registerSuccess').classList.remove('show');
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  if (password.length < 6) { showError('register', '密码至少6位'); setLoading('register', false); return; }
  const { error } = await supabase.auth.signUp({ email, password });
  setLoading('register', false);
  if (error) showError('register', error.message);
  else { document.getElementById('registerSuccess').classList.add('show'); document.getElementById('registerBtn').textContent = '注册成功 ✓'; }
});

document.getElementById('logoutBtn').addEventListener('click', async () => { await supabase.auth.signOut(); });

supabase.auth.onAuthStateChange((event, session) => {
  if (session) {
    currentUser = session.user;
    userEmail.textContent = session.user.email;
    showPage(appPage);
    loadAllData();
  } else {
    currentUser = null;
    showPage(authPage);
    document.querySelectorAll('.auth-form button').forEach(b => b.disabled = false);
    document.querySelectorAll('.auth-loading').forEach(l => l.style.display = 'none');
    document.querySelectorAll('.auth-error').forEach(e => e.classList.remove('show'));
    document.querySelectorAll('.auth-success').forEach(s => s.classList.remove('show'));
    document.getElementById('recordContainer').innerHTML = '';
    document.getElementById('totalCount').textContent = '0';
    document.getElementById('grandTotal').textContent = '0.00';
    document.getElementById('costTotal').textContent = '0.00';
    document.getElementById('costList').innerHTML = '';
  }
});

// ====== 数据 ======
let records = [];
let costs = [];
let costExpanded = false;

function setSyncing(v) { syncBar.textContent = v ? '⏳ 同步中...' : '☁️ 数据已同步到云端'; syncBar.className = v ? 'sync-bar syncing' : 'sync-bar'; }
function setSyncError(m) { syncBar.textContent = '⚠️ '+m; syncBar.className = 'sync-bar error'; }

async function loadAllData() {
  if (!currentUser) return;
  setSyncing(true);
  try {
    const [rR, cR] = await Promise.all([
      supabase.from('records').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: true }),
      supabase.from('costs').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: true })
    ]);
    if (rR.error) throw rR.error;
    if (cR.error) throw cR.error;
    records = rR.data || [];
    costs = cR.data || [];
    renderRecords();
    renderCosts();
    setSyncing(false);
  } catch(e) { setSyncError(e.message); }
}

// ====== 渲染：按日期分组 ======
function renderRecords() {
  const container = document.getElementById('recordContainer');
  const totalCountEl = document.getElementById('totalCount');
  const grandTotalEl = document.getElementById('grandTotal');

  if (records.length === 0) {
    container.innerHTML = '<div class="empty-state">还没有记录，记第一单吧 ✍️</div>';
    totalCountEl.textContent = '0';
    grandTotalEl.textContent = '0.00';
    return;
  }

  // 按日期排序后再分组
  const sortedRecords = [...records].sort((a, b) => dateSortKey(a.date) - dateSortKey(b.date));
  const groups = {};
  sortedRecords.forEach((r, i) => {
    const d = r.date || '未知日期';
    if (!groups[d]) groups[d] = [];
    groups[d].push({ ...r, seq: i + 1 });
  });

  let grandTotal = 0;
  let html = '';

  // 获取排序后的日期列表
  const dateList = Object.keys(groups).sort();

  dateList.forEach(date => {
    const items = groups[date];
    let dayTotal = 0;
    items.forEach(r => { dayTotal += parseFloat(r.price) || 0; grandTotal += parseFloat(r.price) || 0; });

    html += `<div class="date-group"><div class="date-header"><span class="date-label">📅 ${date}</span><span class="date-total">${dayTotal.toFixed(2)} 元</span></div><div class="date-records">`;

    items.forEach(r => {
      const p = parseFloat(r.price) || 0;
      const note = r.note ? `<span class="record-note-text">📌 ${r.note}</span>` : '';
      html += `<div class="record-item"><div><span class="record-num">第 ${r.seq} 单</span>${note}</div><div><span class="record-price-text">${p.toFixed(2)} 元</span><button class="btn-del" data-id="${r.id}">✕</button></div></div>`;
    });

    html += `</div></div>`;
  });

  container.innerHTML = html;
  totalCountEl.textContent = records.length;
  grandTotalEl.textContent = grandTotal.toFixed(2);

  container.querySelectorAll('.btn-del').forEach(btn => {
    btn.addEventListener('click', async function() {
      const id = this.dataset.id;
      if (!confirm('确定删除？')) return;
      await supabase.from('records').delete().eq('id', id);
      records = records.filter(r => r.id !== id);
      renderRecords();
    });
  });
}

// ====== 渲染成本 ======
function renderCosts() {
  const listEl = document.getElementById('costList');
  const totalEl = document.getElementById('costTotal');
  let total = 0;
  costs.forEach(c => { total += parseFloat(c.amount) || 0; });
  totalEl.textContent = total.toFixed(2);
  if (costs.length === 0) { listEl.innerHTML = ''; return; }
  const st = costs.length > 2;
  listEl.innerHTML = costs.map((c, i) => {
    const a = parseFloat(c.amount) || 0;
    return `<div class="cost-item"><input class="cost-input-desc" type="text" value="${escHtml(c.description)}" placeholder="成本项目" data-cid="${c.id}" data-field="desc"><input class="cost-input-amount" type="number" value="${a||''}" placeholder="金额" min="0" step="0.01" data-cid="${c.id}" data-field="amount"><button class="cost-btn-del" data-cid="${c.id}">✕</button></div>`;
  }).join('');
  if (st) {
    listEl.classList.add('collapsed');
    if (costExpanded) listEl.classList.remove('collapsed');
    const tb = document.createElement('button');
    tb.className = 'cost-toggle-btn';
    tb.textContent = costExpanded ? '▲ 收起' : `▼ 展开全部（共 ${costs.length} 项）`;
    tb.onclick = () => { costExpanded = !costExpanded; renderCosts(); };
    listEl.appendChild(tb);
  } else { listEl.classList.remove('collapsed'); costExpanded = false; }
  let timers = {};
  listEl.querySelectorAll('.cost-input-desc, .cost-input-amount').forEach(inp => {
    inp.addEventListener('input', function() {
      const cid = this.dataset.cid, field = this.dataset.field;
      const cost = costs.find(c => c.id === cid);
      if (!cost) return;
      if (field === 'amount') cost.amount = parseFloat(this.value) || 0;
      else cost.description = this.value;
      let t = 0; costs.forEach(c => { t += parseFloat(c.amount) || 0; });
      document.getElementById('costTotal').textContent = t.toFixed(2);
      clearTimeout(timers[cid]);
      timers[cid] = setTimeout(async () => { await supabase.from('costs').update({ [field]: cost[field] }).eq('id', cid); }, 1000);
    });
  });
  listEl.querySelectorAll('.cost-btn-del').forEach(btn => {
    btn.addEventListener('click', async function() {
      const cid = this.dataset.cid;
      await supabase.from('costs').delete().eq('id', cid);
      costs = costs.filter(c => c.id !== cid);
      renderCosts();
    });
  });
}

function escHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ====== 新增记账 ======
document.getElementById('btnAdd').addEventListener('click', async function() {
  const date = document.getElementById('inputDate').value;
  const price = document.getElementById('inputPrice').value;
  const note = document.getElementById('inputNote').value.trim();
  if (!date) { alert('请选择日期'); return; }
  if (!price || parseFloat(price) <= 0) { alert('请输入有效的价钱'); return; }
  const { data, error } = await supabase.from('records').insert({ user_id: currentUser.id, date, price: parseFloat(price), note }).select();
  if (error) { setSyncError(error.message); return; }
  records.push(data[0]);
  renderRecords();
  document.getElementById('inputPrice').value = '';
  document.getElementById('inputNote').value = '';
  document.getElementById('inputPrice').focus();
});

// ====== 成本 ======
document.getElementById('btnCostToggle').addEventListener('click', function() {
  const o = document.getElementById('costPanel').classList.toggle('open');
  this.classList.toggle('open', o);
  this.textContent = o ? '💰 收起成本' : '💰 成本';
});
document.getElementById('costAddBtn').addEventListener('click', async function() {
  const { data, error } = await supabase.from('costs').insert({ user_id: currentUser.id, description: '', amount: 0 }).select();
  if (error) { setSyncError(error.message); return; }
  costs.push(data[0]); renderCosts();
  const items = document.querySelectorAll('.cost-item');
  if (items.length) items[items.length-1].querySelector('.cost-input-desc').focus();
});
document.getElementById('costClearBtn').addEventListener('click', async function() {
  if (!confirm('确定清空所有成本项？')) return;
  for (const c of costs) await supabase.from('costs').delete().eq('id', c.id);
  costs = []; renderCosts();
});
document.getElementById('btnClearAll').addEventListener('click', async function() {
  if (!confirm('确定清空全部记录？')) return;
  for (const r of records) await supabase.from('records').delete().eq('id', r.id);
  records = []; renderRecords();
});

// ====== 查看文本形式 ======
document.getElementById('btnTextView').addEventListener('click', function() {
  const modal = document.getElementById('textModal');
  const content = document.getElementById('textViewContent');

  let txt = '=== 拍照记账 ===\n';

  // 成本
  if (costs.length > 0) {
    txt += '\n--- 成本 ---\n';
    let ct = 0;
    costs.forEach(c => { const a=parseFloat(c.amount)||0; ct+=a; txt += `  ${c.description||'(未命名)'}：${a.toFixed(2)}元\n`; });
    txt += `  成本合计：${ct.toFixed(2)}元\n`;
  }

  // 汇总
  let gt = 0;
  records.forEach(r => { gt += parseFloat(r.price) || 0; });
  txt += `\n总单数：${records.length}\n总金额：${gt.toFixed(2)} 元\n\n`;

  // 按日期排序后再分组
  const sortedRecs = [...records].sort((a, b) => dateSortKey(a.date) - dateSortKey(b.date));
  const groups = {};
  sortedRecs.forEach((r, i) => {
    const d = r.date || '未知日期';
    if (!groups[d]) groups[d] = [];
    groups[d].push({ ...r, seq: i + 1 });
  });

  const dateList = Object.keys(groups).sort();
  dateList.forEach(date => {
    const items = groups[date];
    let dt = 0;
    items.forEach(r => { dt += parseFloat(r.price) || 0; });
    txt += `📅 ${date}  —  ${dt.toFixed(2)}元\n`;
    items.forEach(r => {
      const p = parseFloat(r.price) || 0;
      txt += `  第${r.seq}单  ${p.toFixed(2)}元`;
      if (r.note) txt += `  📌 ${r.note}`;
      txt += '\n';
    });
  });

  content.textContent = txt;
  modal.classList.add('open');
});

document.getElementById('textModalClose').addEventListener('click', () => {
  document.getElementById('textModal').classList.remove('open');
});
document.getElementById('textModal').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});

// ====== 导入 ======
document.getElementById('btnImport').addEventListener('click', function() {
  const text = prompt('粘贴旧账本数据（一行一条）：\n\n格式示例：\n2026/03/17-第1单-金额：50.\n2026/03~05-第2单-金额：50.\n2026-01-01 100 张三');
  if (!text || !text.trim()) return;

  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  let imported = 0;
  const newItems = [];

  lines.forEach(line => {
    if (/^(日期|date|单价|小计|合计|━━|===|#)/i.test(line)) return;
    if (/^[─═━=]+$/.test(line)) return;

    let date = '', price = 0, note = '';
    let m;

    // 格式1: "2026/03/17-第1单-金额：50." 或 "2026/03~05-第2单-金额：50."
    m = line.match(/^(\S+?)\s*-\s*第\d+单\s*-\s*金额[：:]\s*(\d+(?:\.\d+)?)\s*\.?\s*$/);
    if (m) { date = m[1]; price = parseFloat(m[2]); }
    else {
      // 格式2: "2026/03/17-第1单-金额：50.-备注"
      m = line.match(/^(\S+?)\s*-\s*第\d+单\s*-\s*金额[：:]\s*(\d+(?:\.\d+)?)\s*\.?\s*-\s*(.+)$/);
      if (m) { date = m[1]; price = parseFloat(m[2]); note = m[3].trim(); }
      else {
        // 格式3: 标准 "2024-01-01 100 备注"
        m = line.match(/^(\d{4}[-/\.]\d{1,2}[-/\.]\d{1,2})\s+(\d+(?:\.\d+)?)\s*(.*?)$/);
        if (m) { date = normalizeDate(m[1]); price = parseFloat(m[2]); note = m[3].trim(); }
        else {
          // 格式4: CSV "2024-01-01,100,备注"
          m = line.match(/^(\d{4}[-/\.]\d{1,2}[-/\.]\d{1,2})\s*[,，]\s*(\d+(?:\.\d+)?)\s*(?:[,，]\s*(.*?))?$/);
          if (m) { date = normalizeDate(m[1]); price = parseFloat(m[2]); note = (m[3]||'').trim(); }
        }
      }
    }

    if (date && price > 0) {
      newItems.push({ date, price, note });
      imported++;
    }
  });

  if (imported === 0) {
    alert('未能识别出有效数据。\n\n格式示例：\n2026/03/17-第1单-金额：50.\n2026/03~05-第2单-金额：50.');
    return;
  }

  // 合并到记录并排序
  records.push(...newItems);
  records.sort((a, b) => dateSortKey(a.date) - dateSortKey(b.date));

  // 批量存到云端
  (async () => {
    setSyncing(true);
    try {
      for (const item of newItems) {
      for (const item of newItems) {
        await supabase.from('records').insert({
          user_id: currentUser.id,
          date: item.date,
          price: item.price,
          note: item.note || ''
        });
      }
      // 重新加载全部数据
      await loadAllData();
      alert(`✅ 成功导入 ${imported} 条记录！`);
    } catch(e) {
      setSyncError(e.message);
    }
  })();
});

function normalizeDate(str) {
  const parts = str.split(/[-/\.]/);
  if (parts.length === 3) return `${parts[0]}-${String(parts[1]).padStart(2,'0')}-${String(parts[2]).padStart(2,'0')}`;
  return str;
}

// 日期排序键：让 "2026/03~05" 排到 3月，"2026/03/17" 精确排
function dateSortKey(date) {
  if (!date) return '9999-99-99';
  let m = date.match(/^(\d{4})[-/\.](\d{1,2})[-/\.](\d{1,2})/);
  if (m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
  m = date.match(/^(\d{4})[-/\.](\d{1,2})/);
  if (m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-00`;
  return date;
}
