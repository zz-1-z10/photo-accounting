<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>拍照记账</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="拍照记账">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f7fa;color:#1a1a2e;padding:0;max-width:640px;margin:0 auto}
.page{display:none;padding:16px;padding-bottom:80px}.page.active{display:block}
h1{text-align:center;font-size:22px;font-weight:700;color:#16213e;margin:20px 0 16px;display:flex;align-items:center;justify-content:center;gap:8px}
.auth-container{display:flex;flex-direction:column;justify-content:center;min-height:90vh;padding:30px 20px}
.auth-box{background:#fff;border-radius:20px;padding:30px 24px;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
.auth-box .logo{text-align:center;font-size:48px;margin-bottom:8px}
.auth-box .title{text-align:center;font-size:20px;font-weight:700;color:#16213e;margin-bottom:4px}
.auth-box .subtitle{text-align:center;font-size:14px;color:#999;margin-bottom:24px}
.auth-tabs{display:flex;margin-bottom:20px;border-radius:10px;overflow:hidden;border:1.5px solid #e0e0e0}
.auth-tab{flex:1;padding:10px;text-align:center;font-size:15px;font-weight:500;cursor:pointer;background:#fafafa;color:#999;border:none}
.auth-tab.active{background:#4361ee;color:#fff}
.auth-form{display:none;flex-direction:column;gap:14px}.auth-form.active{display:flex}
.auth-form input{width:100%;padding:12px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:16px;font-family:inherit;background:#fafafa}
.auth-form input:focus{outline:none;border-color:#4361ee;background:#fff}
.auth-form .btn-auth{width:100%;padding:14px;background:linear-gradient(135deg,#4361ee,#3a0ca3);color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:600;cursor:pointer}
.auth-error{background:#fff0f0;color:#e63946;padding:10px 14px;border-radius:10px;font-size:14px;display:none;text-align:center}.auth-error.show{display:block}
.auth-loading{text-align:center;color:#999;font-size:14px;padding:20px 0;display:none}
.user-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;margin:0 16px;margin-top:16px;background:#fff;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,0.04)}
.user-bar .user-email{font-size:13px;color:#666;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.user-bar .btn-logout{background:none;border:none;font-size:13px;color:#e63946;cursor:pointer;padding:4px 10px;border-radius:6px}
.form-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.06);margin:0 16px 16px}
.form-row{display:flex;gap:12px;margin-bottom:12px}
.form-group{flex:1;display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:13px;color:#666;font-weight:500}
.form-group input{padding:10px 12px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:16px;background:#fafafa;font-family:inherit;width:100%}
.form-group input:focus{outline:none;border-color:#4361ee;background:#fff}
.form-group textarea{padding:10px 12px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:16px;background:#fafafa;font-family:inherit;width:100%;resize:vertical;min-height:80px}
.form-group textarea:focus{outline:none;border-color:#4361ee;background:#fff}
.btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,#4361ee,#3a0ca3);color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:600;cursor:pointer}
.btn-submit-sm{padding:10px 18px;background:linear-gradient(135deg,#4361ee,#3a0ca3);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
.btn-secondary{padding:10px 18px;background:#f0f0f0;color:#333;border:none;border-radius:10px;font-size:15px;cursor:pointer}
.btn-cost-toggle{width:100%;padding:12px;background:none;border:1.5px dashed #ccc;border-radius:12px;font-size:15px;font-weight:500;color:#666;cursor:pointer;margin-top:10px}
.cost-panel{display:none;border-top:1px solid #f0f0f0;margin-top:12px;padding-top:12px}.cost-panel.open{display:block}
.cost-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cost-header .cost-total-amount{font-size:18px;font-weight:700;color:#e63946}
.cost-btn-clear{background:none;border:none;font-size:12px;color:#bbb;cursor:pointer}
.cost-list{display:flex;flex-direction:column;gap:6px}
.cost-item{display:flex;gap:8px;align-items:center}
.cost-item input{padding:8px 10px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;background:#fafafa;font-family:inherit}
.cost-item .cost-input-desc{flex:3;width:0;min-width:0}
.cost-item .cost-input-amount{flex:1.2;width:0;min-width:0}
.cost-item .cost-btn-del{background:none;border:none;font-size:16px;color:#ccc;cursor:pointer}
.cost-add-row{margin-top:6px;padding:8px;background:none;border:1px dashed #ddd;border-radius:8px;font-size:13px;color:#999;cursor:pointer;width:100%}
.cost-list.collapsed .cost-item:nth-child(n+3){display:none}
.cost-toggle-btn{display:block;width:100%;text-align:center;padding:6px;font-size:13px;color:#999;background:none;border:none;cursor:pointer}
.stats-bar{display:flex;justify-content:space-around;background:linear-gradient(135deg,#16213e,#1a1a2e);color:#fff;border-radius:14px;padding:16px 20px;margin:0 16px 16px}
.stat-item{text-align:center}.stat-label{font-size:12px;opacity:.7}.stat-value{font-size:22px;font-weight:700;margin-top:2px}
.list-header{display:flex;justify-content:space-between;align-items:center;margin:0 16px 10px}
.list-header h2{font-size:16px;color:#333}
.btn-clear{background:none;border:none;font-size:13px;color:#e63946;cursor:pointer}
.date-group{margin:0 16px}.date-group+.date-group{margin-top:12px}
.date-header{background:#fff;border-radius:12px 12px 0 0;padding:10px 16px 8px;display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600;color:#16213e;border-bottom:1px solid #f0f0f0}
.date-header .date-total{font-size:15px;color:#2d6a4f}
.date-records{background:#fff;border-radius:0 0 12px 12px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,0.05)}
.date-records .record-item{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f5f5f5}
.date-records .record-item:last-child{border-bottom:none}
.record-item .record-num{font-size:12px;color:#4361ee;font-weight:600;background:#eef1ff;padding:1px 8px;border-radius:10px}
.record-item .record-note-text{font-size:13px;color:#999;margin-left:8px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.record-item .record-price-text{font-size:16px;font-weight:700;color:#2d6a4f}
.record-item .btn-del{background:none;border:none;font-size:16px;color:#ccc;cursor:pointer;margin-left:6px}
.empty-state{text-align:center;color:#aaa;padding:40px 0;font-size:15px;margin:0 16px}
.import-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:100;overflow-y:auto;padding:20px 16px}
.import-modal.open{display:block}
.import-modal .modal-box{background:#fff;border-radius:16px;padding:20px;max-width:640px;margin:20px auto}
.import-modal h3{font-size:16px;color:#16213e;margin-bottom:10px;display:flex;justify-content:space-between}
.import-modal .close-btn{background:none;border:none;font-size:20px;color:#999;cursor:pointer}
.import-hint{font-size:13px;color:#888;background:#f8f9fc;border-radius:8px;padding:10px 12px;margin-bottom:12px;line-height:1.7}
.import-hint code{background:#eef1ff;color:#4361ee;padding:1px 5px;border-radius:4px;font-size:12px}
.import-actions{display:flex;gap:10px;margin-top:10px}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:100;overflow-y:auto;padding:20px 16px;padding-bottom:60px}
.modal-overlay.open{display:block}
.modal-content{background:#fff;border-radius:16px;padding:20px;max-width:640px;margin:20px auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-header h3{font-size:18px;color:#16213e}
.modal-close{background:none;border:none;font-size:22px;color:#999;cursor:pointer}
.text-view{font-size:14px;line-height:1.8;color:#333;white-space:pre-wrap;font-family:monospace}
.sync-bar{text-align:center;font-size:12px;color:#bbb;padding:4px 0 0;margin:0 16px}
.toolbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;padding:8px 16px;padding-bottom:max(8px,env(safe-area-inset-bottom));display:flex;gap:10px;max-width:640px;margin:0 auto;align-items:center}
.toolbar button{padding:12px;border:1.5px solid #e0e0e0;border-radius:10px;background:#fff;font-size:14px;font-weight:500;color:#333;cursor:pointer}
.toolbar .btn-small{padding:8px 10px;font-size:12px;flex:0 0 auto;color:#4361ee;border-color:#4361ee}
.toolbar .btn-text{flex:1;color:#2d6a4f;border-color:#2d6a4f}
</style>
</head>
<body>

<div id="authPage" class="page active">
  <div class="auth-container">
    <div class="auth-box">
      <div class="logo">📸</div><div class="title">拍照记账</div>
      <div class="subtitle">登录后数据自动同步到云端</div>
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">登录</button>
        <button class="auth-tab" onclick="switchTab('register')">注册</button>
      </div>
      <form class="auth-form active" id="loginForm" onsubmit="return doLogin(event)">
        <div class="auth-error" id="loginError"></div>
        <input type="email" id="loginEmail" placeholder="邮箱" required>
        <input type="password" id="loginPassword" placeholder="密码" required>
        <button class="btn-auth" id="loginBtn">登录</button>
        <div class="auth-loading" id="loginLoading">登录中...</div>
      </form>
      <form class="auth-form" id="registerForm" onsubmit="return doRegister(event)">
        <div class="auth-error" id="registerError"></div>
        <div class="auth-success" id="registerSuccess" style="display:none;text-align:center;color:#2d6a4f;padding:14px;background:#edf7f0;border-radius:10px">✅ 注册成功！请登录</div>
        <input type="email" id="regEmail" placeholder="邮箱" required>
        <input type="password" id="regPassword" placeholder="密码（至少6位）" required>
        <button class="btn-auth" id="registerBtn">注册</button>
        <div class="auth-loading" id="registerLoading">注册中...</div>
      </form>
    </div>
  </div>
</div>

<div id="appPage" class="page">
  <div class="user-bar">
    <span class="user-email" id="userEmail"></span>
    <button class="btn-logout" onclick="doLogout()">退出</button>
  </div>
  <div class="form-card" style="margin-top:12px">
    <div class="form-row">
      <div class="form-group"><label>📅 日期</label><input type="date" id="inputDate"></div>
      <div class="form-group"><label>💰 价钱（元）</label><input type="number" id="inputPrice" placeholder="这单多少钱" min="0" step="0.01"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>📝 备注 <span style="color:#aaa">（可选）</span></label><input type="text" id="inputNote" placeholder="比如：张三、婚礼跟拍..."></div>
    </div>
    <button class="btn-submit" onclick="addRecord()">➕ 记一单</button>
    <button class="btn-cost-toggle" id="costToggle" onclick="toggleCost()">💰 成本</button>
    <div class="cost-panel" id="costPanel">
      <div class="cost-header">
        <span>总成本</span>
        <span><button class="cost-btn-clear" onclick="if(confirm('确定清空所有成本项？'))clearCosts()">清空</button> <span class="cost-total-amount" id="costTotal">0.00</span> 元</span>
      </div>
      <div class="cost-list" id="costList"></div>
      <button class="cost-add-row" onclick="addCostItem()">➕ 添加一项</button>
    </div>
  </div>
  <div class="sync-bar" id="syncBar">☁️ 数据已同步到云端</div>
  <div class="stats-bar">
    <div class="stat-item"><div class="stat-label">总单数</div><div class="stat-value" id="totalCount">0</div></div>
    <div class="stat-item"><div class="stat-label">总金额（元）</div><div class="stat-value" id="grandTotal">0.00</div></div>
  </div>
  <div class="list-header">
    <h2>📋 每单明细</h2>
    <button class="btn-clear" onclick="if(confirm('确定清空全部记录？'))clearAllRecords()">清空</button>
  </div>
  <div id="recordContainer"></div>
</div>

<!-- 导入弹窗 -->
<div class="import-modal" id="importModal">
  <div class="modal-box">
    <h3>📥 批量导入 <button class="close-btn" onclick="closeImport()">✕</button></h3>
    <div class="import-hint">
      支持格式（每行一条）：<br>
      📌 <code>2026/03/17-第1单-金额：50.</code><br>
      📌 <code>2026/03~05-第2单-金额：50.</code><br>
      📌 <code>2026-01-01 100 张三</code>
    </div>
    <div class="form-group"><textarea id="importText" rows="6" placeholder="把旧账本粘贴到这里..."></textarea></div>
    <div class="import-actions">
      <button class="btn-submit-sm" onclick="parseImport()">🔍 识别并导入</button>
      <button class="btn-secondary" onclick="closeImport()">取消</button>
    </div>
  </div>
</div>

<!-- 文本查看 -->
<div class="modal-overlay" id="textModal" onclick="if(event.target===this)closeText()">
  <div class="modal-content">
    <div class="modal-header"><h3>📄 账本文本形式</h3><button class="modal-close" onclick="closeText()">✕</button></div>
    <div class="text-view" id="textViewContent"></div>
  </div>
</div>

<div class="toolbar" id="toolbar" style="display:none">
  <button class="btn-small" onclick="openImport()">📥导入</button>
  <button class="btn-text" onclick="showTextView()">📄 查看文本形式</button>
</div>

<script>
// ====== Supabase ======
const SB_URL = 'https://ekqbzemiumadjknhqhfm.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVrcWJ6ZW1pdW1hZGprbmhxaGZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NTM5OTEsImV4cCI6MjA5NjEyOTk5MX0.7im4Y2tEypBVCriHqwf5-S91m-b6AwmDMumc2cu0Vsc';
const R = SB_URL + '/rest/v1';
const A = SB_URL + '/auth/v1';

let user = null, token = null, records = [], costs = [], costOpen = false, costExpand = false, costTimers = {};

function $(id){return document.getElementById(id)}
function hd(){const h={'apikey':SB_KEY,'Content-Type':'application/json'};if(token)h['Authorization']='Bearer '+token;return h}
async function api(m,u,b){const o={method:m,headers:hd()};if(b)o.body=JSON.stringify(b);const r=await fetch(u,o);if(r.status===204)return null;const d=await r.json();if(!r.ok)throw new Error(d.message||d.error_description||d.msg||'失败');return d}
function dk(d){if(!d)return'9';let m=d.match(/^(\d{4})[-\/\.](\d{1,2})[-\/\.](\d{1,2})/);if(m)return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');m=d.match(/^(\d{4})[-\/\.](\d{1,2})/);if(m)return m[1]+'-'+m[2].padStart(2,'0')+'-00';return d}

function page(p){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));$(p).classList.add('active');$('toolbar').style.display=p==='appPage'?'flex':'none'}
function sync(v){$('syncBar').textContent=v?'⏳ 同步中...':'☁️ 数据已同步到云端'}

// ====== 登录 ======
function switchTab(t){document.querySelectorAll('.auth-tab,.auth-form').forEach(x=>x.classList.remove('active'));$(t+'Form').classList.add('active');document.querySelectorAll('.auth-error').forEach(x=>x.classList.remove('show'));$('registerSuccess').style.display='none';document.querySelectorAll('.auth-tab')[t==='login'?0:1].classList.add('active')}
function ae(f,m){$(f+'Error').textContent=m;$(f+'Error').classList.add('show')}

async function doLogin(e){e.preventDefault();$('loginBtn').disabled=true;$('loginLoading').style.display='block';$('loginError').classList.remove('show')
try{const d=await api('POST',A+'/token?grant_type=password',{email:$('loginEmail').value.trim(),password:$('loginPassword').value});user=d.user;token=d.access_token;localStorage.setItem('t',d.access_token);localStorage.setItem('u',JSON.stringify(d.user));goApp()}catch(e){ae('login',e.message.includes('Invalid')?'邮箱或密码错误':e.message)}
$('loginBtn').disabled=false;$('loginLoading').style.display='none'}

async function doRegister(e){e.preventDefault();$('registerBtn').disabled=true;$('registerLoading').style.display='block';$('registerError').classList.remove('show')
const em=$('regEmail').value.trim(),pw=$('regPassword').value;if(pw.length<6){ae('register','密码至少6位');$('registerBtn').disabled=false;$('registerLoading').style.display='none';return}
try{await api('POST',A+'/signup',{email:em,password:pw});$('registerSuccess').style.display='block';$('registerBtn').textContent='注册成功 ✓'}catch(e){ae('register',e.message)}
$('registerBtn').disabled=false;$('registerLoading').style.display='none'}

async function doLogout(){try{await api('POST',A+'/logout')}catch(e){}user=null;token=null;localStorage.removeItem('t');localStorage.removeItem('u');page('authPage')}

async function goApp(){page('appPage');$('userEmail').textContent=user.email;$('inputDate').value=new Date().toISOString().slice(0,10);await loadData()}

// ====== 数据 ======
async function loadData(){sync(true);try{const[a,b]=await Promise.all([api('GET',R+'/records?user_id=eq.'+user.id+'&order=created_at.asc'),api('GET',R+'/costs?user_id=eq.'+user.id+'&order=created_at.asc')]);records=a||[];costs=b||[];renderR();renderC();sync(false)}catch(e){$('syncBar').textContent='⚠️ '+e.message}}

// ====== 渲染 ======
function renderR(){const el=$('recordContainer');if(!records.length){el.innerHTML='<div class="empty-state">还没有记录，记第一单吧 ✍️</div>';$('totalCount').textContent='0';$('grandTotal').textContent='0.00';return}
const s=[...records].sort((a,b)=>dk(a.date)>dk(b.date)?1:-1),g={};s.forEach((r,i)=>{const d=r.date||'未知';if(!g[d])g[d]=[];g[d].push({...r,seq:i+1})})
let gt=0,h='';Object.keys(g).sort((a,b)=>dk(a)>dk(b)?1:-1).forEach(d=>{const is=g[d];let dt=0;is.forEach(r=>{dt+=+r.price||0;gt+=+r.price||0});h+=`<div class="date-group"><div class="date-header"><span>📅 ${d}</span><span class="date-total">${dt.toFixed(2)} 元</span></div><div class="date-records">`;is.forEach(r=>{const p=+r.price||0;h+=`<div class="record-item"><div><span class="record-num">第 ${r.seq} 单</span>${r.note?`<span class="record-note-text">📌 ${esc(r.note)}</span>`:''}</div><div><span class="record-price-text">${p.toFixed(2)} 元</span><button class="btn-del" onclick="delR('${r.id}')">✕</button></div></div>`});h+=`</div></div>`})
el.innerHTML=h;$('totalCount').textContent=records.length;$('grandTotal').textContent=gt.toFixed(2)}

async function delR(id){if(!confirm('确定删除？'))return;await api('DELETE',R+'/records?id=eq.'+id);records=records.filter(r=>r.id!==id);renderR()}

async function addRecord(){const d=$('inputDate').value,p=$('inputPrice').value,n=$('inputNote').value.trim();if(!d){alert('请选择日期');return}if(!p||+p<=0){alert('请输入有效价钱');return}
const r=await api('POST',R+'/records',{user_id:user.id,date:d,price:+p,note});records.push(r);renderR();$('inputPrice').value='';$('inputNote').value='';$('inputPrice').focus()}

async function clearAllRecords(){for(const r of records)await api('DELETE',R+'/records?id=eq.'+r.id);records=[];renderR()}

// ====== 成本（优化：先本地添加，再后台同步）=====
function toggleCost(){costOpen=!costOpen;$('costPanel').classList.toggle('open',costOpen);$('costToggle').classList.toggle('open',costOpen);$('costToggle').textContent=costOpen?'💰 收起成本':'💰 成本'}

async function addCostItem(){const temp={id:'temp_'+Date.now(),description:'',amount:0,user_id:user.id};costs.push(temp);renderC();setTimeout(()=>{const items=document.querySelectorAll('.cost-item');if(items.length)items[items.length-1].querySelector('.cost-input-desc').focus()},100)
try{const d=await api('POST',R+'/costs',{user_id:user.id,description:'',amount:0});const idx=costs.findIndex(c=>c.id===temp.id);if(idx>=0){costs[idx].id=d.id}renderC()}catch(e){}}

async function delCost(id){if(!confirm('确定删除这项成本？'))return;await api('DELETE',R+'/costs?id=eq.'+id);costs=costs.filter(c=>c.id!==id);renderC()}

async function clearCosts(){for(const c of costs)await api('DELETE',R+'/costs?id=eq.'+c.id);costs=[];renderC()}

function renderC(){const el=$('costList');let t=0;costs.forEach(c=>{t+=+c.amount||0});$('costTotal').textContent=t.toFixed(2);if(!costs.length){el.innerHTML='';return}
const st=costs.length>2;el.innerHTML=costs.map(c=>{const a=+c.amount||0;return`<div class="cost-item"><input class="cost-input-desc" type="text" value="${esc(c.description||'')}" placeholder="成本项目" data-cid="${c.id}" data-field="desc" oninput="cEdit(this)"><input class="cost-input-amount" type="number" value="${a||''}" placeholder="金额" min="0" step="0.01" data-cid="${c.id}" data-field="amount" oninput="cEdit(this)"><button class="cost-btn-del" onclick="delCost('${c.id}')">✕</button></div>`}).join('')
if(st){el.classList.add('collapsed');if(costExpand)el.classList.remove('collapsed');const b=document.createElement('button');b.className='cost-toggle-btn';b.textContent=costExpand?'▲ 收起':`▼ 展开全部（共 ${costs.length} 项）`;b.onclick=()=>{costExpand=!costExpand;renderC()};el.appendChild(b)}else{el.classList.remove('collapsed');costExpand=false}}

function cEdit(inp){const id=inp.dataset.cid,f=inp.dataset.field,c=costs.find(x=>x.id===id);if(!c)return;c[f]=f==='amount'?+inp.value||0:inp.value;let t=0;costs.forEach(x=>{t+=+x.amount||0});$('costTotal').textContent=t.toFixed(2);clearTimeout(costTimers[id]);costTimers[id]=setTimeout(async()=>{try{await api('PATCH',R+'/costs?id=eq.'+id,{[f]:c[f]})}catch(e){}},1000)}

// ====== 导入 ======
function openImport(){$('importModal').classList.add('open');$('importText').value=''}
function closeImport(){$('importModal').classList.remove('open')}

async function parseImport(){const text=$('importText').value;if(!text.trim()){alert('请粘贴数据');return}
const lines=text.split('\n').map(l=>l.trim()).filter(l=>l.length);const items=[]
lines.forEach(line=>{if(/^(日期|date|单价|小计|合计|━━|===|#)/i.test(line)||/^[─═━=]+$/.test(line))return
let d='',p=0,n='',m
m=line.match(/^(\S+?)\s*-\s*第\d+单\s*-\s*金额[：:]\s*(\d+(?:\.\d+)?)\s*\.?\s*$/);if(m){d=m[1];p=+m[2]}
else{m=line.match(/^(\S+?)\s*-\s*第\d+单\s*-\s*金额[：:]\s*(\d+(?:\.\d+)?)\s*\.?\s*[-—](.+)$/);if(m){d=m[1];p=+m[2];n=m[3].trim()}
else{m=line.match(/^(\d{4})[-\/\.](\d{1,2})[-\/\.](\d{1,2})\s+(\d+(?:\.\d+)?)\s*(.*?)$/);if(m){d=m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');p=+m[4];n=m[5].trim()}
else{m=line.match(/^(\d{4})[-\/\.](\d{1,2})[-\/\.](\d{1,2})\s*[,，]\s*(\d+(?:\.\d+)?)\s*(?:[,，]\s*(.*?))?$/);if(m){d=m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');p=+m[4];n=(m[5]||'').trim()}}}}
if(d&&p>0)items.push({date:d,price:p,note:n})})
if(!items.length){alert('未能识别出有效数据');return}
if(!confirm(`识别到 ${items.length} 条记录，确认导入？`))return
sync(true);let ok=0
try{for(const item of items){const r=await api('POST',R+'/records',{user_id:user.id,date:item.date,price:item.price,note:item.note||''});records.push(r);ok++}records.sort((a,b)=>dk(a.date)>dk(b.date)?1:-1);renderR();closeImport();alert('✅ 成功导入 '+ok+' 条记录！')}catch(e){$('syncBar').textContent='⚠️ '+e.message}
sync(false)}

// ====== 文本查看 ======
function showTextView(){let t='=== 拍照记账 ===\n'
if(costs.length){t+='\n--- 成本 ---\n';let ct=0;costs.forEach(c=>{const a=+c.amount||0;ct+=a;t+=`  ${c.description||'(未命名)'}：${a.toFixed(2)}元\n`});t+=`  成本合计：${ct.toFixed(2)}元\n`}
let gt=0;records.forEach(r=>{gt+=+r.price||0});t+=`\n总单数：${records.length}\n总金额：${gt.toFixed(2)} 元\n\n`
const s=[...records].sort((a,b)=>dk(a.date)>dk(b.date)?1:-1),g={};s.forEach((r,i)=>{const d=r.date||'未知';if(!g[d])g[d]=[];g[d].push({...r,seq:i+1})})
Object.keys(g).sort((a,b)=>dk(a)>dk(b)?1:-1).forEach(d=>{const is=g[d];let dt=0;is.forEach(r=>{dt+=+r.price||0});t+=`📅 ${d}  —  ${dt.toFixed(2)}元\n`;is.forEach(r=>{t+=`  第${r.seq}单  ${(+r.price||0).toFixed(2)}元${r.note?'  📌 '+r.note:''}\n`})})
$('textViewContent').textContent=t;$('textModal').classList.add('open')}
function closeText(){$('textModal').classList.remove('open')}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// ====== 初始化 ======
document.addEventListener('DOMContentLoaded',function(){$('inputDate').value=new Date().toISOString().slice(0,10);$('inputPrice').addEventListener('keydown',e=>{if(e.key==='Enter')addRecord()});$('inputNote').addEventListener('keydown',e=>{if(e.key==='Enter')addRecord()})
const t=localStorage.getItem('t'),u=localStorage.getItem('u');if(t&&u){token=t;user=JSON.parse(u);goApp()}})
</script>
