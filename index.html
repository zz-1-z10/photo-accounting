<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>拍照记账</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="拍照记账">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon.svg">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f5f7fa;
  color: #1a1a2e;
  padding: 16px;
  max-width: 640px;
  margin: 0 auto;
  padding-bottom: 80px;
}
h1 {
  text-align: center;
  font-size: 22px;
  font-weight: 700;
  color: #16213e;
  margin: 20px 0 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
h1 span { font-size: 26px; }

/* 表单卡片 */
.form-card {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  margin-bottom: 16px;
}
.form-row {
  display: flex;
  gap: 12px;
  margin-bottom: 12px;
}
.form-row:last-child { margin-bottom: 0; }
.form-group {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.form-group label {
  font-size: 13px;
  color: #666;
  font-weight: 500;
}
.form-group input, .form-group textarea {
  padding: 10px 12px;
  border: 1.5px solid #e0e0e0;
  border-radius: 10px;
  font-size: 16px;
  background: #fafafa;
  transition: border-color 0.2s;
  font-family: inherit;
  width: 100%;
  max-width: 100%;
}
.form-group input:focus, .form-group textarea:focus {
  outline: none;
  border-color: #4361ee;
  background: #fff;
}
.form-group textarea {
  resize: vertical;
  min-height: 38px;
  max-height: 80px;
}
.btn-submit {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #4361ee, #3a0ca3);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.15s, opacity 0.15s;
}
.btn-submit:active { transform: scale(0.98); opacity: 0.85; }
.btn-submit-sm {
  padding: 10px 18px;
  background: linear-gradient(135deg, #4361ee, #3a0ca3);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.15s, opacity 0.15s;
}
.btn-submit-sm:active { transform: scale(0.97); opacity: 0.85; }
.btn-secondary {
  padding: 10px 18px;
  background: #f0f0f0;
  color: #333;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
}
.btn-secondary:active { background: #e0e0e0; }
.btn-cost-toggle {
  width: 100%;
  padding: 12px;
  background: none;
  border: 1.5px dashed #ccc;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 500;
  color: #666;
  cursor: pointer;
  margin-top: 10px;
  transition: all 0.2s;
}
.btn-cost-toggle:hover { border-color: #e63946; color: #e63946; background: #fff5f5; }
.btn-cost-toggle.open { border-color: #e63946; background: #fff5f5; color: #e63946; }

/* 成本面板 */
.cost-panel {
  display: none;
  margin-top: 0;
  border-top: none;
  padding-top: 0;
}
.cost-panel.open {
  display: block;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid #f0f0f0;
}
.cost-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  padding: 0 2px;
}
.cost-header .cost-total-label {
  font-size: 14px;
  color: #333;
  font-weight: 500;
}
.cost-header .cost-total-amount {
  font-size: 18px;
  font-weight: 700;
  color: #e63946;
}
.cost-btn-clear {
  background: none;
  border: none;
  font-size: 12px;
  color: #bbb;
  cursor: pointer;
  padding: 2px 6px;
}
.cost-btn-clear:active { color: #e63946; }

.cost-list { display: flex; flex-direction: column; gap: 6px; }
.cost-item {
  display: flex;
  gap: 8px;
  align-items: center;
}
.cost-item .cost-input-desc {
  flex: 3;
  padding: 8px 10px;
  border: 1.5px solid #e0e0e0;
  border-radius: 8px;
  font-size: 14px;
  background: #fafafa;
  transition: border-color 0.2s;
  font-family: inherit;
  width: 0;
  min-width: 0;
}
.cost-item .cost-input-desc:focus {
  outline: none;
  border-color: #e63946;
  background: #fff;
}
.cost-item .cost-input-amount {
  flex: 1.2;
  padding: 8px 10px;
  border: 1.5px solid #e0e0e0;
  border-radius: 8px;
  font-size: 14px;
  background: #fafafa;
  transition: border-color 0.2s;
  font-family: inherit;
  width: 0;
  min-width: 0;
}
.cost-item .cost-input-amount:focus {
  outline: none;
  border-color: #e63946;
  background: #fff;
}
.cost-item .cost-btn-del {
  background: none;
  border: none;
  font-size: 16px;
  color: #ccc;
  cursor: pointer;
  padding: 0 2px;
  flex-shrink: 0;
}
.cost-item .cost-btn-del:active { color: #e63946; }

.cost-add-row {
  margin-top: 6px;
  padding: 8px;
  background: none;
  border: 1px dashed #ddd;
  border-radius: 8px;
  font-size: 13px;
  color: #999;
  cursor: pointer;
  width: 100%;
  transition: all 0.15s;
}
.cost-add-row:active { background: #fafafa; color: #666; }

/* 成本折叠 */
.cost-list.collapsed .cost-item:nth-child(n+3) { display: none; }
.cost-toggle-btn {
  display: block;
  width: 100%;
  text-align: center;
  padding: 6px;
  font-size: 13px;
  color: #999;
  background: none;
  border: none;
  cursor: pointer;
  margin-top: 2px;
}
.cost-toggle-btn:active { color: #666; }

/* 统计栏 */
.stats-bar {
  display: flex;
  justify-content: space-around;
  background: linear-gradient(135deg, #16213e, #1a1a2e);
  color: #fff;
  border-radius: 14px;
  padding: 16px 20px;
  margin-bottom: 16px;
}
.stat-item { text-align: center; }
.stat-label { font-size: 12px; opacity: 0.7; }
.stat-value { font-size: 22px; font-weight: 700; margin-top: 2px; }

/* 列表 */
.list-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.list-header h2 { font-size: 16px; color: #333; }
.btn-clear {
  background: none;
  border: none;
  font-size: 13px;
  color: #e63946;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
}
.btn-clear:active { background: #fee; }

.record-list { display: flex; flex-direction: column; gap: 8px; }
.record-item {
  background: #fff;
  border-radius: 12px;
  padding: 14px 16px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.05);
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: transform 0.15s;
}
.record-item:active { transform: scale(0.98); }
.record-info { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
.record-order {
  font-size: 12px;
  color: #4361ee;
  font-weight: 600;
  background: #eef1ff;
  display: inline-block;
  padding: 1px 8px;
  border-radius: 10px;
  width: fit-content;
}
.record-date { font-size: 13px; color: #666; margin-top: 2px; }
.record-note {
  font-size: 13px;
  color: #999;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 200px;
}
.record-price {
  font-size: 18px;
  font-weight: 700;
  color: #2d6a4f;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  margin-left: 10px;
}
.btn-del {
  background: none;
  border: none;
  font-size: 18px;
  color: #ccc;
  cursor: pointer;
  padding: 0 4px;
  transition: color 0.15s;
}
.btn-del:active { color: #e63946; }

.empty-state {
  text-align: center;
  color: #aaa;
  padding: 40px 0;
  font-size: 15px;
}

/* 导入面板 */
.import-panel {
  display: none;
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  margin-bottom: 16px;
  border: 2px solid #4361ee;
}
.import-panel.open { display: block; }
.import-panel h3 {
  font-size: 16px;
  color: #16213e;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.import-panel h3 .close-btn {
  background: none;
  border: none;
  font-size: 20px;
  color: #999;
  cursor: pointer;
  padding: 0 4px;
}
.import-hint {
  font-size: 13px;
  color: #888;
  background: #f8f9fc;
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 12px;
  line-height: 1.7;
}
.import-hint code {
  background: #eef1ff;
  color: #4361ee;
  padding: 1px 5px;
  border-radius: 4px;
  font-size: 12px;
}
.import-actions {
  display: flex;
  gap: 10px;
  margin-top: 10px;
  align-items: center;
  flex-wrap: wrap;
}
.import-actions label.file-label {
  padding: 10px 18px;
  background: #f0f0f0;
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
  user-select: none;
}
.import-actions label.file-label:active { background: #e0e0e0; }
.import-actions input[type="file"] { display: none; }

.import-preview {
  margin-top: 12px;
  border-top: 1px solid #eee;
  padding-top: 12px;
}
.import-preview h4 {
  font-size: 14px;
  color: #333;
  margin-bottom: 6px;
}
.import-preview-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.import-preview-table th {
  background: #f0f4ff;
  padding: 6px 8px;
  text-align: left;
  font-weight: 500;
  color: #4361ee;
}
.import-preview-table td {
  padding: 6px 8px;
  border-bottom: 1px solid #f0f0f0;
}
.import-preview-table tr:hover td { background: #fafbff; }

/* 底部工具栏 */
.toolbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #fff;
  border-top: 1px solid #eee;
  padding: 8px 16px;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  display: flex;
  gap: 10px;
  max-width: 640px;
  margin: 0 auto;
}
.toolbar button {
  flex: 1;
  padding: 12px;
  border: 1.5px solid #e0e0e0;
  border-radius: 10px;
  background: #fff;
  font-size: 14px;
  font-weight: 500;
  color: #333;
  cursor: pointer;
  transition: background 0.15s;
}
.toolbar button:active { background: #f5f5f5; }
.toolbar button.export-btn { color: #4361ee; border-color: #4361ee; }
.toolbar button.import-btn { color: #2d6a4f; border-color: #2d6a4f; }
</style>
</head>
<body>

<h1><span>📸</span> 拍照记账</h1>

<!-- 录入表单 -->
<div class="form-card">
  <div class="form-row">
    <div class="form-group">
      <label>📅 日期</label>
      <input type="date" id="inputDate">
    </div>
    <div class="form-group">
      <label>💰 价钱（元）</label>
      <input type="number" id="inputPrice" placeholder="这单多少钱" min="0" step="0.01">
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>📝 备注 <span style="color:#aaa;font-weight:400;">（可选）</span></label>
      <input type="text" id="inputNote" placeholder="比如：张三、婚礼跟拍...">
    </div>
  </div>
  <button class="btn-submit" id="btnAdd">➕ 记一单</button>

  <!-- 成本按钮 -->
  <button class="btn-cost-toggle" id="btnCostToggle">💰 成本</button>

  <!-- 成本面板 -->
  <div class="cost-panel" id="costPanel">
    <div class="cost-header">
      <span class="cost-total-label">总成本</span>
      <span>
        <button class="cost-btn-clear" id="costClearBtn">清空</button>
        <span class="cost-total-amount" id="costTotal">0.00</span> 元
      </span>
    </div>
    <div class="cost-list" id="costList"></div>
    <button class="cost-add-row" id="costAddBtn">➕ 添加一项</button>
  </div>
</div>

<!-- 导入面板 -->
<div class="import-panel" id="importPanel">
  <h3>
    📥 批量导入历史账本
    <button class="close-btn" id="closeImport">✕</button>
  </h3>
  <div class="import-hint">
    <strong>支持格式（每行一条）：</strong><br>
    📌 <code>2024-01-01 5</code> &nbsp;（日期 价钱）<br>
    📌 <code>2024-01-01 5 张三</code> &nbsp;（日期 价钱 备注）<br>
    📌 <code>1/1 5</code> &nbsp;（简写日期）<br>
    📌 CSV 文件上传 &nbsp;·&nbsp; 也支持 Excel 另存为 CSV 导入
  </div>
  <div class="form-group" style="margin-bottom:8px;">
    <textarea id="importText" rows="5" placeholder="把旧账本粘贴到这里...&#10;例如：&#10;2024-01-01 5&#10;2024-01-02 6.5&#10;2024-01-03 5.5 婚礼跟拍"></textarea>
  </div>
  <div class="import-actions">
    <button class="btn-submit-sm" id="btnParseImport">🔍 识别并预览</button>
    <label class="file-label">📂 上传 CSV 文件
      <input type="file" id="csvFileInput" accept=".csv,.txt">
    </label>
  </div>
  <div class="import-preview" id="importPreview" style="display:none;">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <h4>识别结果</h4>
      <span id="parseCount" style="font-size:13px;color:#4361ee;font-weight:500;"></span>
    </div>
    <div style="max-height:200px;overflow-y:auto;margin-top:6px;">
      <table class="import-preview-table" id="previewTable">
        <thead><tr><th>日期</th><th>价钱</th><th>备注</th></tr></thead>
        <tbody id="previewBody"></tbody>
      </table>
    </div>
    <div style="margin-top:10px;display:flex;gap:10px;">
      <button class="btn-submit-sm" id="btnConfirmImport" style="flex:1;">✅ 确认导入</button>
      <button class="btn-secondary" id="btnCancelImport">取消</button>
    </div>
  </div>
</div>

<!-- 统计 -->
<div class="stats-bar">
  <div class="stat-item">
    <div class="stat-label">总单数</div>
    <div class="stat-value" id="totalCount">0</div>
  </div>
  <div class="stat-item">
    <div class="stat-label">总金额（元）</div>
    <div class="stat-value" id="grandTotal">0.00</div>
  </div>
</div>

<!-- 记录列表 -->
<div class="list-header">
  <h2>📋 每单明细</h2>
  <button class="btn-clear" id="btnClearAll">清空全部</button>
</div>
<div class="record-list" id="recordList">
  <div class="empty-state">还没有记录，记第一单吧 ✍️</div>
</div>

<!-- 底部工具栏 -->
<div class="toolbar">
  <button id="btnImport" class="import-btn">📥 批量导入</button>
  <button id="btnExportCSV" class="export-btn">📤 导出 CSV</button>
  <button id="btnExportTXT">📄 导出文本</button>
</div>

<script>
// ========== 数据层 ==========
const STORAGE_KEY = 'photo_accounting_records2';
const COST_KEY = 'photo_accounting_costs';

function loadRecords() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch { return []; }
}

function saveRecords(records) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}

function loadCosts() {
  try {
    return JSON.parse(localStorage.getItem(COST_KEY)) || [];
  } catch { return []; }
}

function saveCosts(costs) {
  localStorage.setItem(COST_KEY, JSON.stringify(costs));
}

// ========== 渲染记账 ==========
function render() {
  const records = loadRecords();
  const listEl = document.getElementById('recordList');
  const totalCountEl = document.getElementById('totalCount');
  const grandTotalEl = document.getElementById('grandTotal');

  let grandTotal = 0;

  if (records.length === 0) {
    listEl.innerHTML = '<div class="empty-state">还没有记录，记第一单吧 ✍️</div>';
  } else {
    listEl.innerHTML = records.map((r, i) => {
      const price = parseFloat(r.price) || 0;
      grandTotal += price;
      const noteHtml = r.note ? `<div class="record-note">📌 ${r.note}</div>` : '';
      return `
        <div class="record-item">
          <div class="record-info">
            <div class="record-order">第 ${i + 1} 单</div>
            <div class="record-date">📅 ${r.date}</div>
            ${noteHtml}
          </div>
          <div class="record-price">
            ${price.toFixed(2)} 元
            <button class="btn-del" data-index="${i}">✕</button>
          </div>
        </div>
      `;
    }).join('');
  }

  totalCountEl.textContent = records.length;
  grandTotalEl.textContent = grandTotal.toFixed(2);

  listEl.querySelectorAll('.btn-del').forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      const idx = parseInt(this.dataset.index);
      if (confirm('确定删除第 ' + (idx + 1) + ' 单？')) deleteRecord(idx);
    });
  });
}

// ========== 渲染成本 ==========
let costExpanded = false;

function renderCosts() {
  const costs = loadCosts();
  const listEl = document.getElementById('costList');
  const totalEl = document.getElementById('costTotal');

  let total = 0;
  costs.forEach(c => { total += parseFloat(c.amount) || 0; });
  totalEl.textContent = total.toFixed(2);

  if (costs.length === 0) {
    listEl.innerHTML = '';
    return;
  }

  const showToggle = costs.length > 2;

  listEl.innerHTML = costs.map((c, i) => {
    const amt = parseFloat(c.amount) || 0;
    return `
      <div class="cost-item">
        <input class="cost-input-desc" type="text" value="${escHtml(c.desc)}" placeholder="成本项目" data-ci="${i}" data-field="desc">
        <input class="cost-input-amount" type="number" value="${amt ? amt : ''}" placeholder="金额" min="0" step="0.01" data-ci="${i}" data-field="amount">
        <button class="cost-btn-del" data-ci="${i}">✕</button>
      </div>
    `;
  }).join('');

  if (showToggle) {
    listEl.classList.add('collapsed');
    if (costExpanded) listEl.classList.remove('collapsed');
    const toggleBtn = document.createElement('button');
    toggleBtn.className = 'cost-toggle-btn';
    toggleBtn.textContent = costExpanded ? '▲ 收起' : `▼ 展开全部（共 ${costs.length} 项）`;
    toggleBtn.addEventListener('click', function() {
      costExpanded = !costExpanded;
      renderCosts();
    });
    listEl.appendChild(toggleBtn);
  } else {
    listEl.classList.remove('collapsed');
    costExpanded = false;
  }

  // 成本项输入监听
  listEl.querySelectorAll('.cost-input-desc, .cost-input-amount').forEach(inp => {
    inp.addEventListener('input', function() {
      const ci = parseInt(this.dataset.ci);
      const field = this.dataset.field;
      const costs = loadCosts();
      if (field === 'amount') {
        costs[ci].amount = parseFloat(this.value) || 0;
      } else {
        costs[ci].desc = this.value;
      }
      saveCosts(costs);
      // 只更新总额，不重新渲染
      let t = 0;
      costs.forEach(c => { t += parseFloat(c.amount) || 0; });
      document.getElementById('costTotal').textContent = t.toFixed(2);
    });
  });

  // 成本项删除
  listEl.querySelectorAll('.cost-btn-del').forEach(btn => {
    btn.addEventListener('click', function() {
      const ci = parseInt(this.dataset.ci);
      const costs = loadCosts();
      costs.splice(ci, 1);
      saveCosts(costs);
      renderCosts();
    });
  });
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ========== 记账操作 ==========
function addRecord(date, price, note) {
  const records = loadRecords();
  records.push({ date, price: parseFloat(price), note: note || '' });
  saveRecords(records);
  render();
}

function addRecordsBulk(newRecords) {
  const records = loadRecords();
  records.push(...newRecords);
  saveRecords(records);
  render();
}

function deleteRecord(index) {
  const records = loadRecords();
  records.splice(index, 1);
  saveRecords(records);
  render();
}

function clearAll() {
  if (confirm('确定要清空全部记录吗？此操作不可撤销。')) {
    saveRecords([]);
    render();
  }
}

// ========== 🧠 智能解析引擎 ==========
function smartParse(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  const results = [];
  const errors = [];
  const yearNow = new Date().getFullYear();

  for (const rawLine of lines) {
    if (/^(日期|date|价钱|单价|小计|合计|备注|━━|===|序号|#)/i.test(rawLine)) continue;
    if (/^[─═━=]+$/.test(rawLine)) continue;

    let line = rawLine;
    line = line.replace(/^\d+[\.\)、》\s]+/, '');

    let date = '', price = 0, note = '';

    let m = line.match(/^(\d{4}[-/\.]\d{1,2}[-/\.]\d{1,2})\s+(\d+(?:\.\d+)?)\s*(.*?)$/);
    if (m) { date = normalizeDate(m[1]); price = parseFloat(m[2]); note = m[3].trim(); }
    else {
      m = line.match(/^(\d{1,2})[-/](\d{1,2})\s+(\d+(?:\.\d+)?)\s*(.*?)$/);
      if (m) {
        date = `${yearNow}-${pad(m[1])}-${pad(m[2])}`;
        price = parseFloat(m[3]); note = m[4].trim();
      } else {
        m = line.match(/^(\d{4}[-/\.]\d{1,2}[-/\.]\d{1,2})\s*[,，]\s*(\d+(?:\.\d+)?)\s*(?:[,，]\s*(.*?))?$/);
        if (m) { date = normalizeDate(m[1]); price = parseFloat(m[2]); note = (m[3]||'').trim(); }
        else {
          errors.push(`无法解析: ${rawLine}`);
          continue;
        }
      }
    }

    if (date && price > 0) {
      results.push({ date, price, note });
    } else {
      errors.push(`数据无效: ${rawLine}`);
    }
  }

  return { results, errors };
}

function pad(n) { return String(n).padStart(2, '0'); }

function normalizeDate(str) {
  const parts = str.split(/[-/\.]/);
  if (parts.length === 3) {
    return `${parts[0]}-${pad(parts[1])}-${pad(parts[2])}`;
  }
  return str;
}

// ========== 导入面板 ==========
let parsedImportRecords = [];

function toggleImportPanel(open) {
  const panel = document.getElementById('importPanel');
  panel.classList.toggle('open', open);
  if (open) {
    document.getElementById('importPreview').style.display = 'none';
    parsedImportRecords = [];
  }
}

function showImportPreview(results) {
  const previewDiv = document.getElementById('importPreview');
  const body = document.getElementById('previewBody');
  const countEl = document.getElementById('parseCount');

  if (results.length === 0) {
    previewDiv.style.display = 'none';
    return;
  }

  let grandTotal = 0;
  body.innerHTML = results.map(r => {
    grandTotal += r.price;
    const noteDisplay = r.note ? r.note : '—';
    return `<tr><td>${r.date}</td><td>${r.price.toFixed(2)}</td><td>${noteDisplay}</td></tr>`;
  }).join('') +
  `<tr style="font-weight:600;background:#f8f9fc;">
    <td>共 ${results.length} 单</td><td>${grandTotal.toFixed(2)}</td><td></td>
  </tr>`;

  countEl.textContent = `共识别 ${results.length} 条记录`;
  previewDiv.style.display = 'block';
  parsedImportRecords = results;
}

// ========== 导出 ==========
function exportCSV() {
  const records = loadRecords();
  if (records.length === 0) { alert('没有记录可导出'); return; }

  let csv = '\uFEFF第几单,日期,价钱,备注\n';
  let grandTotal = 0;

  records.forEach((r, i) => {
    grandTotal += parseFloat(r.price) || 0;
    const note = r.note ? `,${r.note}` : ',';
    csv += `${i+1},${r.date},${parseFloat(r.price).toFixed(2)}${note}\n`;
  });
  csv += `合计,,${grandTotal.toFixed(2)},\n`;

  downloadFile(csv, `拍照记账_${new Date().toISOString().slice(0,10)}.csv`, 'text/csv;charset=utf-8');
}

function exportTXT() {
  const records = loadRecords();
  if (records.length === 0) { alert('没有记录可导出'); return; }

  let txt = '=== 拍照记账 ===\n\n';
  let grandTotal = 0;

  records.forEach((r, i) => {
    const price = parseFloat(r.price) || 0;
    grandTotal += price;
    const noteStr = r.note ? `  📌 ${r.note}` : '';
    txt += `第${i+1}单  [${r.date}]  ${price.toFixed(2)}元${noteStr}\n`;
  });

  // 导出成本
  const costs = loadCosts();
  if (costs.length > 0) {
    txt += `\n--- 成本明细 ---\n`;
    let costTotal = 0;
    costs.forEach(c => {
      const amt = parseFloat(c.amount) || 0;
      costTotal += amt;
      txt += `  ${c.desc || '(未命名)'}：${amt.toFixed(2)}元\n`;
    });
    txt += `  成本合计：${costTotal.toFixed(2)}元\n`;
  }

  txt += `\n━━━━━━━━━━━━━━━━━━\n`;
  txt += `总单数：${records.length}\n`;
  txt += `总收入：${grandTotal.toFixed(2)} 元\n`;
  txt += `导出时间：${new Date().toLocaleString('zh-CN')}\n`;

  downloadFile(txt, `拍照记账_${new Date().toISOString().slice(0,10)}.txt`, 'text/plain;charset=utf-8');
}

function downloadFile(content, filename, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ========== 初始化 ==========
document.addEventListener('DOMContentLoaded', function() {
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('inputDate').value = today;

  document.getElementById('inputPrice').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('btnAdd').click();
  });
  document.getElementById('inputNote').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('btnAdd').click();
  });

  // 添加记录
  document.getElementById('btnAdd').addEventListener('click', function() {
    const date = document.getElementById('inputDate').value;
    const price = document.getElementById('inputPrice').value;
    const note = document.getElementById('inputNote').value.trim();

    if (!date) { alert('请选择日期'); return; }
    if (!price || parseFloat(price) <= 0) { alert('请输入有效的价钱'); return; }

    addRecord(date, price, note);
    document.getElementById('inputPrice').value = '';
    document.getElementById('inputNote').value = '';
    document.getElementById('inputPrice').focus();
  });

  // 清空记账
  document.getElementById('btnClearAll').addEventListener('click', clearAll);

  // 导出
  document.getElementById('btnExportCSV').addEventListener('click', exportCSV);
  document.getElementById('btnExportTXT').addEventListener('click', exportTXT);

  // ====== 成本功能 ======

  // 切换成本面板
  const costToggle = document.getElementById('btnCostToggle');
  const costPanel = document.getElementById('costPanel');
  costToggle.addEventListener('click', function() {
    const isOpen = costPanel.classList.toggle('open');
    costToggle.classList.toggle('open', isOpen);
    costToggle.textContent = isOpen ? '💰 收起成本' : '💰 成本';
  });

  // 添加成本项
  document.getElementById('costAddBtn').addEventListener('click', function() {
    const costs = loadCosts();
    costs.push({ desc: '', amount: 0 });
    saveCosts(costs);
    renderCosts();
    // 滚动到新添加的行
    const items = document.querySelectorAll('.cost-item');
    if (items.length > 0) {
      items[items.length - 1].querySelector('.cost-input-desc').focus();
    }
  });

  // 清空成本
  document.getElementById('costClearBtn').addEventListener('click', function() {
    if (!confirm('确定清空所有成本项？')) return;
    saveCosts([]);
    renderCosts();
  });

  // ====== 导入功能 ======

  document.getElementById('btnImport').addEventListener('click', function() {
    toggleImportPanel(true);
  });

  document.getElementById('closeImport').addEventListener('click', function() {
    toggleImportPanel(false);
  });
  document.getElementById('btnCancelImport').addEventListener('click', function() {
    toggleImportPanel(false);
  });

  document.getElementById('btnParseImport').addEventListener('click', function() {
    const text = document.getElementById('importText').value;
    if (!text.trim()) { alert('请先粘贴或输入旧账本数据'); return; }

    const { results, errors } = smartParse(text);

    if (results.length === 0) {
      alert('未能识别出任何有效记录。\n\n请检查格式，例如：\n2024-01-01 5\n2024-01-02 6.5');
      return;
    }

    if (errors.length > 0) {
      console.log('解析错误行:', errors);
    }

    showImportPreview(results);
  });

  document.getElementById('csvFileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(ev) {
      const text = ev.target.result;
      document.getElementById('importText').value = text;
      const { results, errors } = smartParse(text);
      if (results.length > 0) {
        showImportPreview(results);
        if (errors.length > 0) {
          console.log('解析错误行:', errors);
        }
      } else {
        alert('未能从文件中识别出有效记录。\n确认文件是 CSV 格式，包含 日期、价钱 两列。');
      }
    };
    reader.readAsText(file, 'UTF-8');
    this.value = '';
  });

  document.getElementById('btnConfirmImport').addEventListener('click', function() {
    if (parsedImportRecords.length === 0) {
      alert('没有可导入的数据，请先识别');
      return;
    }

    const msg = `确认导入 ${parsedImportRecords.length} 条记录到当前账本？\n现有记录不会被覆盖。`;
    if (!confirm(msg)) return;

    addRecordsBulk(parsedImportRecords);
    parsedImportRecords = [];
    toggleImportPanel(false);
    document.getElementById('importText').value = '';
    alert('✅ 导入成功！');
  });

  // 渲染
  render();
  renderCosts();

  // 注册 Service Worker（PWA 安装支持）
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
});
</script>
