<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>拍照记账本</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f5f7fa;
  color: #1a1a2e;
  padding: 16px;
  max-width: 640px;
  margin: 0 auto;
  padding-bottom: 80px;
}
h1 {
  text-align: center;
  font-size: 22px;
  font-weight: 700;
  color: #16213e;
  margin: 20px 0 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
h1 span { font-size: 26px; }

/* 表单卡片 */
.form-card {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  margin-bottom: 16px;
}
.form-row {
  display: flex;
  gap: 12px;
  margin-bottom: 12px;
}
.form-row:last-child { margin-bottom: 0; }
.form-group {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.form-group label {
  font-size: 13px;
  color: #666;
  font-weight: 500;
}
.form-group input, .form-group textarea {
  padding: 10px 12px;
  border: 1.5px solid #e0e0e0;
  border-radius: 10px;
  font-size: 16px;
  background: #fafafa;
  transition: border-color 0.2s;
  font-family: inherit;
}
.form-group input:focus, .form-group textarea:focus {
  outline: none;
  border-color: #4361ee;
  background: #fff;
}
.btn-submit {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #4361ee, #3a0ca3);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.15s, opacity 0.15s;
}
.btn-submit:active { transform: scale(0.98); opacity: 0.85; }
.btn-submit-sm {
  padding: 10px 18px;
  background: linear-gradient(135deg, #4361ee, #3a0ca3);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.15s, opacity 0.15s;
}
.btn-submit-sm:active { transform: scale(0.97); opacity: 0.85; }
.btn-secondary {
  padding: 10px 18px;
  background: #f0f0f0;
  color: #333;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
}
.btn-secondary:active { background: #e0e0e0; }

/* 统计栏 */
.stats-bar {
  display: flex;
  justify-content: space-between;
  background: linear-gradient(135deg, #16213e, #1a1a2e);
  color: #fff;
  border-radius: 14px;
  padding: 16px 20px;
  margin-bottom: 16px;
}
.stat-item { text-align: center; }
.stat-label { font-size: 12px; opacity: 0.7; }
.stat-value { font-size: 22px; font-weight: 700; margin-top: 2px; }

/* 列表 */
.list-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.list-header h2 { font-size: 16px; color: #333; }
.btn-clear {
  background: none;
  border: none;
  font-size: 13px;
  color: #e63946;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
}
.btn-clear:active { background: #fee; }

.record-list { display: flex; flex-direction: column; gap: 8px; }
.record-item {
  background: #fff;
  border-radius: 12px;
  padding: 14px 16px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.05);
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: transform 0.15s;
}
.record-item:active { transform: scale(0.98); }
.record-info { display: flex; flex-direction: column; gap: 2px; }
.record-date { font-size: 13px; color: #666; }
.record-detail { font-size: 15px; color: #333; font-weight: 500; }
.record-total {
  font-size: 18px;
  font-weight: 700;
  color: #2d6a4f;
  display: flex;
  align-items: center;
  gap: 10px;
}
.btn-del {
  background: none;
  border: none;
  font-size: 18px;
  color: #ccc;
  cursor: pointer;
  padding: 0 4px;
  transition: color 0.15s;
}
.btn-del:active { color: #e63946; }

.empty-state {
  text-align: center;
  color: #aaa;
  padding: 40px 0;
  font-size: 15px;
}

/* 导入面板 */
.import-panel {
  display: none;
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  margin-bottom: 16px;
  border: 2px solid #4361ee;
}
.import-panel.open { display: block; }
.import-panel h3 {
  font-size: 16px;
  color: #16213e;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.import-panel h3 .close-btn {
  background: none;
  border: none;
  font-size: 20px;
  color: #999;
  cursor: pointer;
  padding: 0 4px;
}
.import-hint {
  font-size: 13px;
  color: #888;
  background: #f8f9fc;
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 12px;
  line-height: 1.7;
}
.import-hint code {
  background: #eef1ff;
  color: #4361ee;
  padding: 1px 5px;
  border-radius: 4px;
  font-size: 12px;
}
.import-actions {
  display: flex;
  gap: 10px;
  margin-top: 10px;
  align-items: center;
  flex-wrap: wrap;
}
.import-actions label.file-label {
  padding: 10px 18px;
  background: #f0f0f0;
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
  user-select: none;
}
.import-actions label.file-label:active { background: #e0e0e0; }
.import-actions input[type="file"] { display: none; }

.import-preview {
  margin-top: 12px;
  border-top: 1px solid #eee;
  padding-top: 12px;
}
.import-preview h4 {
  font-size: 14px;
  color: #333;
  margin-bottom: 6px;
}
.import-preview-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.import-preview-table th {
  background: #f0f4ff;
  padding: 6px 8px;
  text-align: left;
  font-weight: 500;
  color: #4361ee;
}
.import-preview-table td {
  padding: 6px 8px;
  border-bottom: 1px solid #f0f0f0;
}
.import-preview-table tr:hover td { background: #fafbff; }

/* 底部工具栏 */
.toolbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #fff;
  border-top: 1px solid #eee;
  padding: 8px 16px;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  display: flex;
  gap: 10px;
  max-width: 640px;
  margin: 0 auto;
}
.toolbar button {
  flex: 1;
  padding: 12px;
  border: 1.5px solid #e0e0e0;
  border-radius: 10px;
  background: #fff;
  font-size: 14px;
  font-weight: 500;
  color: #333;
  cursor: pointer;
  transition: background 0.15s;
}
.toolbar button:active { background: #f5f5f5; }
.toolbar button.export-btn { color: #4361ee; border-color: #4361ee; }
.toolbar button.import-btn { color: #2d6a4f; border-color: #2d6a4f; }
</style>
</head>
<body>

<h1><span>📸</span> 拍照记账本</h1>

<!-- 录入表单 -->
<div class="form-card">
  <div class="form-row">
    <div class="form-group">
      <label>📅 日期</label>
      <input type="date" id="inputDate">
    </div>
    <div class="form-group">
      <label>🔢 单数</label>
      <input type="number" id="inputCount" placeholder="多少单" min="1" step="1">
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>💰 单价（元）</label>
      <input type="number" id="inputPrice" placeholder="每单多少钱" min="0" step="0.01">
    </div>
  </div>
  <div style="font-size:14px;color:#666;margin-bottom:10px;text-align:right;">
    小计：<strong id="previewTotal">0.00</strong> 元
  </div>
  <button class="btn-submit" id="btnAdd">➕ 添加记录</button>
</div>

<!-- 导入面板 -->
<div class="import-panel" id="importPanel">
  <h3>
    📥 批量导入历史账本
    <button class="close-btn" id="closeImport">✕</button>
  </h3>
  <div class="import-hint">
    <strong>支持格式（每行一条）：</strong><br>
    📌 <code>2024-01-01 10 5</code> &nbsp;（日期 单数 单价）<br>
    📌 <code>2024-01-01 10单 5元</code> &nbsp;（带单位）<br>
    📌 <code>2024/1/1 10×5</code> &nbsp;（乘号分隔）<br>
    📌 <code>1/1 10单×5元</code> &nbsp;（简写日期）<br>
    📌 CSV 文件上传 &nbsp;·&nbsp; 也支持 Excel 另存为 CSV 导入
  </div>
  <div class="form-group" style="margin-bottom:8px;">
    <textarea id="importText" rows="5" placeholder="把旧账本粘贴到这里...&#10;例如：&#10;2024-01-01 10 5&#10;2024-01-02 8 6.5&#10;2024-01-03 12 5.5"></textarea>
  </div>
  <div class="import-actions">
    <button class="btn-submit-sm" id="btnParseImport">🔍 识别并预览</button>
    <label class="file-label">📂 上传 CSV 文件
      <input type="file" id="csvFileInput" accept=".csv,.txt">
    </label>
  </div>
  <div class="import-preview" id="importPreview" style="display:none;">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <h4>识别结果</h4>
      <span id="parseCount" style="font-size:13px;color:#4361ee;font-weight:500;"></span>
    </div>
    <div style="max-height:200px;overflow-y:auto;margin-top:6px;">
      <table class="import-preview-table" id="previewTable">
        <thead><tr><th>日期</th><th>单数</th><th>单价</th><th>小计</th></tr></thead>
        <tbody id="previewBody"></tbody>
      </table>
    </div>
    <div style="margin-top:10px;display:flex;gap:10px;">
      <button class="btn-submit-sm" id="btnConfirmImport" style="flex:1;">✅ 确认导入</button>
      <button class="btn-secondary" id="btnCancelImport">取消</button>
    </div>
  </div>
</div>

<!-- 统计 -->
<div class="stats-bar">
  <div class="stat-item">
    <div class="stat-label">总单数</div>
    <div class="stat-value" id="totalCount">0</div>
  </div>
  <div class="stat-item">
    <div class="stat-label">总金额</div>
    <div class="stat-value" id="grandTotal">0.00</div>
  </div>
  <div class="stat-item">
    <div class="stat-label">记录数</div>
    <div class="stat-value" id="recordCount">0</div>
  </div>
</div>

<!-- 记录列表 -->
<div class="list-header">
  <h2>📋 记账明细</h2>
  <button class="btn-clear" id="btnClearAll">清空全部</button>
</div>
<div class="record-list" id="recordList">
  <div class="empty-state">还没有记录，开始记账吧 ✍️</div>
</div>

<!-- 底部工具栏 -->
<div class="toolbar">
  <button id="btnImport" class="import-btn">📥 批量导入</button>
  <button id="btnExportCSV" class="export-btn">📤 导出 CSV</button>
  <button id="btnExportTXT">📄 导出文本</button>
</div>

<script>
// ========== 数据层 ==========
const STORAGE_KEY = 'photo_accounting_records';

function loadRecords() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch { return []; }
}

function saveRecords(records) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}

// ========== 计算 ==========
function calcTotal(price, count) {
  return (parseFloat(price) || 0) * (parseInt(count) || 0);
}

// ========== 渲染 ==========
function render() {
  const records = loadRecords();
  const listEl = document.getElementById('recordList');
  const totalCountEl = document.getElementById('totalCount');
  const grandTotalEl = document.getElementById('grandTotal');
  const recordCountEl = document.getElementById('recordCount');

  let grandCount = 0;
  let grandTotal = 0;

  if (records.length === 0) {
    listEl.innerHTML = '<div class="empty-state">还没有记录，开始记账吧 ✍️</div>';
  } else {
    listEl.innerHTML = records.map((r, i) => {
      const total = calcTotal(r.price, r.count);
      grandCount += parseInt(r.count) || 0;
      grandTotal += total;
      return `
        <div class="record-item">
          <div class="record-info">
            <div class="record-date">📅 ${r.date}</div>
            <div class="record-detail">${r.count} 单 × ${parseFloat(r.price).toFixed(2)} 元</div>
          </div>
          <div class="record-total">
            ${total.toFixed(2)} 元
            <button class="btn-del" data-index="${i}">✕</button>
          </div>
        </div>
      `;
    }).join('');
  }

  totalCountEl.textContent = grandCount;
  grandTotalEl.textContent = grandTotal.toFixed(2);
  recordCountEl.textContent = records.length;

  listEl.querySelectorAll('.btn-del').forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      const idx = parseInt(this.dataset.index);
      deleteRecord(idx);
    });
  });
}

// ========== 操作 ==========
function addRecord(date, count, price) {
  const records = loadRecords();
  records.push({ date, count: parseInt(count), price: parseFloat(price) });
  saveRecords(records);
  render();
}

function addRecordsBulk(newRecords) {
  const records = loadRecords();
  records.push(...newRecords);
  saveRecords(records);
  render();
}

function deleteRecord(index) {
  const records = loadRecords();
  records.splice(index, 1);
  saveRecords(records);
  render();
}

function clearAll() {
  if (confirm('确定要清空全部记录吗？此操作不可撤销。')) {
    saveRecords([]);
    render();
  }
}

// ========== 🧠 智能解析引擎 ==========
function smartParse(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  const results = [];
  const errors = [];
  const yearNow = new Date().getFullYear();

  for (const rawLine of lines) {
    // 跳过表头/分隔线/合计行
    if (/^(日期|date|单数|单价|小计|合计|━━|===|序号|#)/i.test(rawLine)) continue;
    if (/^[─═━=]+$/.test(rawLine)) continue;

    let line = rawLine;

    // 去掉行号前缀 "1. " "1) " "1、"
    line = line.replace(/^\d+[\.\)、》\s]+/, '');

    // 尝试各种格式
    let date = '', count = 0, price = 0;

    // --- 格式1: 标准 CSV "2024-01-01,10,5" 或 "2024-01-01,10,5,50" ---
    let m = line.match(/^(\d{4}[-/\.]\d{1,2}[-/\.]\d{1,2})\s*[,，\s]+\s*(\d+)\s*[,，\s]+\s*(\d+(?:\.\d+)?)/);
    if (m) { date = normalizeDate(m[1]); count = parseInt(m[2]); price = parseFloat(m[3]); }
    else {
      // --- 格式2: "1/1 10单 5元" → 补充当前年 ---
      m = line.match(/^(\d{1,2})[-/](\d{1,2})\s+(\d+)\s*单?\s*[×xX*]\s*(\d+(?:\.\d+)?)\s*元?/);
      if (m) {
        date = `${yearNow}-${pad(m[1])}-${pad(m[2])}`;
        count = parseInt(m[3]); price = parseFloat(m[4]);
      } else {
        // --- 格式3: "2024-01-01 10单×5元" ---
        m = line.match(/^(\d{4}[-/\.]\d{1,2}[-/\.]\d{1,2})\s+(\d+)\s*单?\s*[×xX*]\s*(\d+(?:\.\d+)?)\s*元?/);
        if (m) { date = normalizeDate(m[1]); count = parseInt(m[2]); price = parseFloat(m[3]); }
        else {
          // --- 格式4: "1/1 10 5" (简写日期，空格分隔) ---
          m = line.match(/^(\d{1,2})[-/](\d{1,2})\s+(\d+)\s+(\d+(?:\.\d+)?)/);
          if (m) {
            date = `${yearNow}-${pad(m[1])}-${pad(m[2])}`;
            count = parseInt(m[3]); price = parseFloat(m[4]);
          } else {
            // --- 格式5: "2024.1.1 10单 5元" (带单位的空格分隔) ---
            m = line.match(/^(\d{4})[-/\.](\d{1,2})[-/\.](\d{1,2})\s+(\d+)\s*单\s+(\d+(?:\.\d+)?)\s*元/);
            if (m) { date = `${m[1]}-${pad(m[2])}-${pad(m[3])}`; count = parseInt(m[4]); price = parseFloat(m[5]); }
            else {
              // --- 格式6: 纯空格分隔 "2024-01-01 10 5" 最通用 ---
              m = line.match(/^(\d{4}[-/\.]\d{1,2}[-/\.]\d{1,2})\s+(\d+)\s+(\d+(?:\.\d+)?)/);
              if (m) { date = normalizeDate(m[1]); count = parseInt(m[2]); price = parseFloat(m[3]); }
              else {
                errors.push(`无法解析: ${rawLine}`);
                continue;
              }
            }
          }
        }
      }
    }

    if (date && count > 0 && price > 0) {
      results.push({ date, count, price });
    } else {
      errors.push(`数据无效: ${rawLine}`);
    }
  }

  return { results, errors };
}

function pad(n) { return String(n).padStart(2, '0'); }

function normalizeDate(str) {
  // 支持 2024-01-01 / 2024/01/01 / 2024.1.1 统一成 2024-01-01
  const parts = str.split(/[-/\.]/);
  if (parts.length === 3) {
    return `${parts[0]}-${pad(parts[1])}-${pad(parts[2])}`;
  }
  return str;
}

// ========== 导入面板 ==========
let parsedImportRecords = [];

function toggleImportPanel(open) {
  const panel = document.getElementById('importPanel');
  panel.classList.toggle('open', open);
  if (open) {
    document.getElementById('importPreview').style.display = 'none';
    parsedImportRecords = [];
  }
}

function showImportPreview(results) {
  const previewDiv = document.getElementById('importPreview');
  const body = document.getElementById('previewBody');
  const countEl = document.getElementById('parseCount');

  if (results.length === 0) {
    previewDiv.style.display = 'none';
    return;
  }

  let grandCount = 0, grandTotal = 0;
  body.innerHTML = results.map(r => {
    const total = calcTotal(r.price, r.count);
    grandCount += r.count;
    grandTotal += total;
    return `<tr><td>${r.date}</td><td>${r.count}</td><td>${r.price.toFixed(2)}</td><td>${total.toFixed(2)}</td></tr>`;
  }).join('') +
  `<tr style="font-weight:600;background:#f8f9fc;">
    <td>合计</td><td>${grandCount}</td><td></td><td>${grandTotal.toFixed(2)}</td>
  </tr>`;

  countEl.textContent = `共识别 ${results.length} 条记录`;
  previewDiv.style.display = 'block';
  parsedImportRecords = results;
}

// ========== 导出 ==========
function exportCSV() {
  const records = loadRecords();
  if (records.length === 0) { alert('没有记录可导出'); return; }

  let csv = '\uFEFF日期,单数,单价,小计\n';
  let grandCount = 0;
  let grandTotal = 0;

  records.forEach(r => {
    const total = calcTotal(r.price, r.count);
    grandCount += parseInt(r.count) || 0;
    grandTotal += total;
    csv += `${r.date},${r.count},${parseFloat(r.price).toFixed(2)},${total.toFixed(2)}\n`;
  });
  csv += `合计,,${grandCount},${grandTotal.toFixed(2)}\n`;

  downloadFile(csv, `拍照记账_${new Date().toISOString().slice(0,10)}.csv`, 'text/csv;charset=utf-8');
}

function exportTXT() {
  const records = loadRecords();
  if (records.length === 0) { alert('没有记录可导出'); return; }

  let txt = '=== 拍照记账本 ===\n\n';
  let grandCount = 0;
  let grandTotal = 0;

  records.forEach((r, i) => {
    const total = calcTotal(r.price, r.count);
    grandCount += parseInt(r.count) || 0;
    grandTotal += total;
    txt += `${i+1}. [${r.date}] ${r.count}单 × ${parseFloat(r.price).toFixed(2)}元 = ${total.toFixed(2)}元\n`;
  });

  txt += `\n━━━━━━━━━━━━━━━━━━\n`;
  txt += `总单数：${grandCount}\n`;
  txt += `总金额：${grandTotal.toFixed(2)} 元\n`;
  txt += `记录数：${records.length}\n`;
  txt += `导出时间：${new Date().toLocaleString('zh-CN')}\n`;

  downloadFile(txt, `拍照记账_${new Date().toISOString().slice(0,10)}.txt`, 'text/plain;charset=utf-8');
}

function downloadFile(content, filename, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ========== 预览小计 ==========
function updatePreview() {
  const count = parseInt(document.getElementById('inputCount').value) || 0;
  const price = parseFloat(document.getElementById('inputPrice').value) || 0;
  document.getElementById('previewTotal').textContent = (count * price).toFixed(2);
}

// ========== 初始化 ==========
document.addEventListener('DOMContentLoaded', function() {
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('inputDate').value = today;

  document.getElementById('inputCount').addEventListener('input', updatePreview);
  document.getElementById('inputPrice').addEventListener('input', updatePreview);

  // 添加记录
  document.getElementById('btnAdd').addEventListener('click', function() {
    const date = document.getElementById('inputDate').value;
    const count = document.getElementById('inputCount').value;
    const price = document.getElementById('inputPrice').value;

    if (!date) { alert('请选择日期'); return; }
    if (!count || parseInt(count) <= 0) { alert('请输入有效的单数'); return; }
    if (!price || parseFloat(price) <= 0) { alert('请输入有效的单价'); return; }

    addRecord(date, count, price);
    document.getElementById('inputCount').value = '';
    document.getElementById('inputPrice').value = '';
    document.getElementById('previewTotal').textContent = '0.00';
    document.getElementById('inputCount').focus();
  });

  // 清空
  document.getElementById('btnClearAll').addEventListener('click', clearAll);

  // 导出
  document.getElementById('btnExportCSV').addEventListener('click', exportCSV);
  document.getElementById('btnExportTXT').addEventListener('click', exportTXT);

  // ====== 导入功能 ======

  // 打开导入面板
  document.getElementById('btnImport').addEventListener('click', function() {
    toggleImportPanel(true);
  });

  // 关闭导入面板
  document.getElementById('closeImport').addEventListener('click', function() {
    toggleImportPanel(false);
  });
  document.getElementById('btnCancelImport').addEventListener('click', function() {
    toggleImportPanel(false);
  });

  // 解析导入文本
  document.getElementById('btnParseImport').addEventListener('click', function() {
    const text = document.getElementById('importText').value;
    if (!text.trim()) { alert('请先粘贴或输入旧账本数据'); return; }

    const { results, errors } = smartParse(text);

    if (results.length === 0) {
      alert('未能识别出任何有效记录。\n\n请检查格式，例如：\n2024-01-01 10 5\n2024-01-02 8 6.5');
      return;
    }

    if (errors.length > 0) {
      console.log('解析错误行:', errors);
    }

    showImportPreview(results);
  });

  // CSV 文件上传
  document.getElementById('csvFileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(ev) {
      const text = ev.target.result;
      document.getElementById('importText').value = text;
      // 自动触发解析
      const { results, errors } = smartParse(text);
      if (results.length > 0) {
        showImportPreview(results);
        if (errors.length > 0) {
          console.log('解析错误行:', errors);
        }
      } else {
        alert('未能从文件中识别出有效记录。\n确认文件是 CSV 格式，包含 日期、单数、单价 三列。');
      }
    };
    reader.readAsText(file, 'UTF-8');

    // 重置 input 以便重复上传同一文件
    this.value = '';
  });

  // 确认导入
  document.getElementById('btnConfirmImport').addEventListener('click', function() {
    if (parsedImportRecords.length === 0) {
      alert('没有可导入的数据，请先识别');
      return;
    }

    const msg = `确认导入 ${parsedImportRecords.length} 条记录到当前账本？\n现有记录不会被覆盖。`;
    if (!confirm(msg)) return;

    addRecordsBulk(parsedImportRecords);
    parsedImportRecords = [];
    toggleImportPanel(false);
    document.getElementById('importText').value = '';
    alert('✅ 导入成功！');
  });

  // 渲染
  render();
});
</script>

</body>
</html>
