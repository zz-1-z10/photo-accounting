<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>拍照记账</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="拍照记账">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon.svg">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f5f7fa;
  color: #1a1a2e;
  padding: 0;
  max-width: 640px;
  margin: 0 auto;
}
.page { display: none; padding: 16px; padding-bottom: 80px; }
.page.active { display: block; }
h1 {
  text-align: center;
  font-size: 22px;
  font-weight: 700;
  color: #16213e;
  margin: 20px 0 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

/* ====== 登录页 ====== */
.auth-container {
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 90vh;
  padding: 30px 20px;
}
.auth-box {
  background: #fff;
  border-radius: 20px;
  padding: 30px 24px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}
.auth-box .logo {
  text-align: center;
  font-size: 48px;
  margin-bottom: 8px;
}
.auth-box .title {
  text-align: center;
  font-size: 20px;
  font-weight: 700;
  color: #16213e;
  margin-bottom: 4px;
}
.auth-box .subtitle {
  text-align: center;
  font-size: 14px;
  color: #999;
  margin-bottom: 24px;
}
.auth-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 20px;
  border-radius: 10px;
  overflow: hidden;
  border: 1.5px solid #e0e0e0;
}
.auth-tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  background: #fafafa;
  color: #999;
  border: none;
  transition: all 0.2s;
}
.auth-tab.active { background: #4361ee; color: #fff; }
.auth-form { display: none; flex-direction: column; gap: 14px; }
.auth-form.active { display: flex; }
.auth-form input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid #e0e0e0;
  border-radius: 10px;
  font-size: 16px;
  font-family: inherit;
  background: #fafafa;
  transition: border-color 0.2s;
}
.auth-form input:focus { outline: none; border-color: #4361ee; background: #fff; }
.auth-form .btn-auth {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #4361ee, #3a0ca3);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.15s, opacity 0.15s;
}
.auth-form .btn-auth:active { transform: scale(0.98); opacity: 0.85; }
.auth-form .btn-auth:disabled { opacity: 0.5; }
.auth-error {
  background: #fff0f0;
  color: #e63946;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 14px;
  display: none;
  text-align: center;
}
.auth-error.show { display: block; }
.auth-loading {
  text-align: center;
  color: #999;
  font-size: 14px;
  padding: 20px 0;
}
.auth-success {
  text-align: center;
  color: #2d6a4f;
  font-size: 15px;
  padding: 14px 0;
  background: #edf7f0;
  border-radius: 10px;
  display: none;
}
.auth-success.show { display: block; }

/* ====== 用户栏 ====== */
.user-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  margin: 0 16px;
  margin-top: 16px;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.04);
}
.user-bar .user-email {
  font-size: 13px;
  color: #666;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
}
.user-bar .btn-logout {
  background: none;
  border: none;
  font-size: 13px;
  color: #e63946;
  cursor: pointer;
  padding: 4px 10px;
  border-radius: 6px;
  flex-shrink: 0;
}
.user-bar .btn-logout:active { background: #fee; }

/* ====== 表单样式 ====== */
.form-card {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  margin: 0 16px 16px;
}
.form-row {
  display: flex;
  gap: 12px;
  margin-bottom: 12px;
}
.form-row:last-child { margin-bottom: 0; }
.form-group {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.form-group label {
  font-size: 13px;
  color: #666;
  font-weight: 500;
}
.form-group input {
  padding: 10px 12px;
  border: 1.5px solid #e0e0e0;
  border-radius: 10px;
  font-size: 16px;
  background: #fafafa;
  transition: border-color 0.2s;
  font-family: inherit;
  width: 100%;
  max-width: 100%;
}
.form-group input:focus {
  outline: none;
  border-color: #4361ee;
  background: #fff;
}
.btn-submit {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #4361ee, #3a0ca3);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.15s, opacity 0.15s;
}
.btn-submit:active { transform: scale(0.98); opacity: 0.85; }
.btn-cost-toggle {
  width: 100%;
  padding: 12px;
  background: none;
  border: 1.5px dashed #ccc;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 500;
  color: #666;
  cursor: pointer;
  margin-top: 10px;
  transition: all 0.2s;
}
.btn-cost-toggle:hover { border-color: #e63946; color: #e63946; background: #fff5f5; }
.btn-cost-toggle.open { border-color: #e63946; background: #fff5f5; color: #e63946; }

/* 成本面板 */
.cost-panel {
  display: none;
  margin-top: 0;
  border-top: none;
  padding-top: 0;
}
.cost-panel.open {
  display: block;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid #f0f0f0;
}
.cost-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  padding: 0 2px;
}
.cost-header .cost-total-label { font-size: 14px; color: #333; font-weight: 500; }
.cost-header .cost-total-amount { font-size: 18px; font-weight: 700; color: #e63946; }
.cost-btn-clear { background: none; border: none; font-size: 12px; color: #bbb; cursor: pointer; padding: 2px 6px; }
.cost-btn-clear:active { color: #e63946; }
.cost-list { display: flex; flex-direction: column; gap: 6px; }
.cost-item {
  display: flex;
  gap: 8px;
  align-items: center;
}
.cost-item input {
  padding: 8px 10px;
  border: 1.5px solid #e0e0e0;
  border-radius: 8px;
  font-size: 14px;
  background: #fafafa;
  font-family: inherit;
}
.cost-item input:focus { outline: none; border-color: #e63946; background: #fff; }
.cost-item .cost-input-desc { flex: 3; width: 0; min-width: 0; }
.cost-item .cost-input-amount { flex: 1.2; width: 0; min-width: 0; }
.cost-item .cost-btn-del { background: none; border: none; font-size: 16px; color: #ccc; cursor: pointer; padding: 0 2px; flex-shrink: 0; }
.cost-item .cost-btn-del:active { color: #e63946; }
.cost-add-row {
  margin-top: 6px; padding: 8px; background: none; border: 1px dashed #ddd; border-radius: 8px;
  font-size: 13px; color: #999; cursor: pointer; width: 100%;
}
.cost-add-row:active { background: #fafafa; }
.cost-list.collapsed .cost-item:nth-child(n+3) { display: none; }
.cost-toggle-btn { display: block; width: 100%; text-align: center; padding: 6px; font-size: 13px; color: #999; background: none; border: none; cursor: pointer; margin-top: 2px; }

/* 统计栏 */
.stats-bar {
  display: flex;
  justify-content: space-around;
  background: linear-gradient(135deg, #16213e, #1a1a2e);
  color: #fff;
  border-radius: 14px;
  padding: 16px 20px;
  margin: 0 16px 16px;
}
.stat-item { text-align: center; }
.stat-label { font-size: 12px; opacity: 0.7; }
.stat-value { font-size: 22px; font-weight: 700; margin-top: 2px; }

/* 列表 */
.list-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 0 16px 10px;
}
.list-header h2 { font-size: 16px; color: #333; }
.btn-clear { background: none; border: none; font-size: 13px; color: #e63946; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
.btn-clear:active { background: #fee; }
.record-list { display: flex; flex-direction: column; gap: 8px; padding: 0 16px; }
.record-item {
  background: #fff; border-radius: 12px; padding: 14px 16px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.05);
  display: flex; align-items: center; justify-content: space-between;
}
.record-info { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
.record-order {
  font-size: 12px; color: #4361ee; font-weight: 600; background: #eef1ff;
  display: inline-block; padding: 1px 8px; border-radius: 10px; width: fit-content;
}
.record-date { font-size: 13px; color: #666; margin-top: 2px; }
.record-note { font-size: 13px; color: #999; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
.record-price {
  font-size: 18px; font-weight: 700; color: #2d6a4f;
  display: flex; align-items: center; gap: 10px; flex-shrink: 0; margin-left: 10px;
}
.btn-del { background: none; border: none; font-size: 18px; color: #ccc; cursor: pointer; padding: 0 4px; }
.btn-del:active { color: #e63946; }
.empty-state { text-align: center; color: #aaa; padding: 40px 0; font-size: 15px; }

/* 同步提示 */
.sync-bar {
  text-align: center;
  font-size: 12px;
  color: #bbb;
  padding: 4px 0 0;
  margin: 0 16px;
}
.sync-bar.syncing { color: #4361ee; }
.sync-bar.error { color: #e63946; }

/* 底部工具栏 */
.toolbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #fff;
  border-top: 1px solid #eee;
  padding: 8px 16px;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  display: flex;
  gap: 10px;
  max-width: 640px;
  margin: 0 auto;
}
.toolbar button {
  flex: 1;
  padding: 12px;
  border: 1.5px solid #e0e0e0;
  border-radius: 10px;
  background: #fff;
  font-size: 14px;
  font-weight: 500;
  color: #333;
  cursor: pointer;
}
.toolbar button:active { background: #f5f5f5; }
.toolbar button.export-btn { color: #4361ee; border-color: #4361ee; }
.toolbar button.import-btn { color: #2d6a4f; border-color: #2d6a4f; }
</style>
</head>
<body>

<!-- ====== 登录页 ====== -->
<div id="authPage" class="page active">
  <div class="auth-container">
    <div class="auth-box">
      <div class="logo">📸</div>
      <div class="title">拍照记账</div>
      <div class="subtitle">登录后数据自动同步到云端</div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">登录</button>
        <button class="auth-tab" data-tab="register">注册</button>
      </div>

      <!-- 登录表单 -->
      <form class="auth-form active" id="loginForm">
        <div class="auth-error" id="loginError"></div>
        <input type="email" id="loginEmail" placeholder="邮箱" required autocomplete="email">
        <input type="password" id="loginPassword" placeholder="密码（至少6位）" required autocomplete="current-password">
        <button class="btn-auth" id="loginBtn">登录</button>
        <div class="auth-loading" id="loginLoading" style="display:none;">登录中...</div>
      </form>

      <!-- 注册表单 -->
      <form class="auth-form" id="registerForm">
        <div class="auth-error" id="registerError"></div>
        <div class="auth-success" id="registerSuccess">✅ 注册成功！正在登录...</div>
        <input type="email" id="regEmail" placeholder="邮箱" required autocomplete="email">
        <input type="password" id="regPassword" placeholder="密码（至少6位）" required autocomplete="new-password">
        <button class="btn-auth" id="registerBtn">注册</button>
        <div class="auth-loading" id="registerLoading" style="display:none;">注册中...</div>
      </form>
    </div>
  </div>
</div>

<!-- ====== 记账 App ====== -->
<div id="appPage" class="page">

  <!-- 用户栏 -->
  <div class="user-bar">
    <span class="user-email" id="userEmail"></span>
    <button class="btn-logout" id="logoutBtn">退出</button>
  </div>

  <!-- 录入 -->
  <div class="form-card" style="margin-top:12px;">
    <div class="form-row">
      <div class="form-group">
        <label>📅 日期</label>
        <input type="date" id="inputDate">
      </div>
      <div class="form-group">
        <label>💰 价钱（元）</label>
        <input type="number" id="inputPrice" placeholder="这单多少钱" min="0" step="0.01">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>📝 备注 <span style="color:#aaa;font-weight:400;">（可选）</span></label>
        <input type="text" id="inputNote" placeholder="比如：张三、婚礼跟拍...">
      </div>
    </div>
    <button class="btn-submit" id="btnAdd">➕ 记一单</button>

    <button class="btn-cost-toggle" id="btnCostToggle">💰 成本</button>
    <div class="cost-panel" id="costPanel">
      <div class="cost-header">
        <span class="cost-total-label">总成本</span>
        <span>
          <button class="cost-btn-clear" id="costClearBtn">清空</button>
          <span class="cost-total-amount" id="costTotal">0.00</span> 元
        </span>
      </div>
      <div class="cost-list" id="costList"></div>
      <button class="cost-add-row" id="costAddBtn">➕ 添加一项</button>
    </div>
  </div>

  <!-- 同步状态 -->
  <div class="sync-bar" id="syncBar">数据已同步到云端 ☁️</div>

  <!-- 统计 -->
  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-label">总单数</div>
      <div class="stat-value" id="totalCount">0</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">总金额（元）</div>
      <div class="stat-value" id="grandTotal">0.00</div>
    </div>
  </div>

  <!-- 记录 -->
  <div class="list-header">
    <h2>📋 每单明细</h2>
    <button class="btn-clear" id="btnClearAll">清空全部</button>
  </div>
  <div class="record-list" id="recordList">
    <div class="empty-state">还没有记录，记第一单吧 ✍️</div>
  </div>
</div>

<!-- 底部工具栏 -->
<div class="toolbar" id="toolbar" style="display:none;">
  <button id="btnExportCSV" class="export-btn">📤 导出 CSV</button>
  <button id="btnExportTXT">📄 导出文本</button>
</div>

<script type="module">
// ====== Supabase 初始化 ======
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.49.4';

const SUPABASE_URL = 'https://ekqbzemiumadjknhqhfm.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVrcWJ6ZW1pdW1hZGprbmhxaGZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NTM5OTEsImV4cCI6MjA5NjEyOTk5MX0.7im4Y2tEypBVCriHqwf5-S91m-b6AwmDMumc2cu0Vsc';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ====== DOM 引用 ======
const authPage = document.getElementById('authPage');
const appPage = document.getElementById('appPage');
const toolbar = document.getElementById('toolbar');
const userEmail = document.getElementById('userEmail');
const syncBar = document.getElementById('syncBar');

// ====== 用户状态 ======
let currentUser = null;

// ====== 页面切换 ======
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  page.classList.add('active');
  toolbar.style.display = page === appPage ? 'flex' : 'none';
}

// ====== 认证 UI ======
// Tab 切换
document.querySelectorAll('.auth-tab').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    document.getElementById(this.dataset.tab + 'Form').classList.add('active');
    document.querySelectorAll('.auth-error').forEach(e => e.classList.remove('show'));
    document.querySelectorAll('.auth-success').forEach(s => s.classList.remove('show'));
  });
});

function setLoading(formId, loading) {
  document.getElementById(formId + 'Btn').disabled = loading;
  document.getElementById(formId + 'Loading').style.display = loading ? 'block' : 'none';
}

function showError(formId, msg) {
  const el = document.getElementById(formId + 'Error');
  el.textContent = msg;
  el.classList.add('show');
}

// 登录
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  setLoading('login', true);
  document.getElementById('loginError').classList.remove('show');

  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;

  const { error } = await supabase.auth.signInWithPassword({ email, password });
  setLoading('login', false);

  if (error) {
    if (error.message.includes('Invalid login credentials')) {
      showError('login', '邮箱或密码错误');
    } else {
      showError('login', error.message);
    }
  }
});

// 注册
document.getElementById('registerForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  setLoading('register', true);
  document.getElementById('registerError').classList.remove('show');
  document.getElementById('registerSuccess').classList.remove('show');

  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;

  if (password.length < 6) {
    showError('register', '密码至少6位');
    setLoading('register', false);
    return;
  }

  const { error } = await supabase.auth.signUp({ email, password });
  setLoading('register', false);

  if (error) {
    showError('register', error.message);
  } else {
    document.getElementById('registerSuccess').classList.add('show');
    document.getElementById('registerBtn').textContent = '注册成功 ✓';
  }
});

// 退出
document.getElementById('logoutBtn').addEventListener('click', async () => {
  await supabase.auth.signOut();
});

// ====== 认证状态监听 ======
supabase.auth.onAuthStateChange((event, session) => {
  if (session) {
    currentUser = session.user;
    userEmail.textContent = session.user.email;
    showPage(appPage);
    loadAllData();
  } else {
    currentUser = null;
    showPage(authPage);
    // 重置表单
    document.getElementById('loginBtn').textContent = '登录';
    document.getElementById('registerBtn').textContent = '注册';
    document.querySelectorAll('.auth-loading').forEach(l => l.style.display = 'none');
    document.querySelectorAll('.auth-error').forEach(e => e.classList.remove('show'));
    document.querySelectorAll('.auth-success').forEach(s => s.classList.remove('show'));
    document.querySelectorAll('.auth-form button').forEach(b => b.disabled = false);
    document.getElementById('recordList').innerHTML = '<div class="empty-state">还没有记录，记第一单吧 ✍️</div>';
    document.getElementById('totalCount').textContent = '0';
    document.getElementById('grandTotal').textContent = '0.00';
    document.getElementById('costTotal').textContent = '0.00';
    document.getElementById('costList').innerHTML = '';
  }
});

// ====== 同步状态 ======
function setSyncing(show) {
  if (show) {
    syncBar.textContent = '⏳ 同步中...';
    syncBar.className = 'sync-bar syncing';
  } else {
    syncBar.textContent = '☁️ 数据已同步到云端';
    syncBar.className = 'sync-bar';
  }
}

function setSyncError(msg) {
  syncBar.textContent = '⚠️ ' + msg;
  syncBar.className = 'sync-bar error';
}

// ====== 数据加载 ======
let records = [];
let costs = [];
let costExpanded = false;

async function loadAllData() {
  if (!currentUser) return;
  setSyncing(true);
  try {
    const [recRes, costRes] = await Promise.all([
      supabase.from('records').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: true }),
      supabase.from('costs').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: true })
    ]);
    if (recRes.error) throw recRes.error;
    if (costRes.error) throw costRes.error;
    records = recRes.data || [];
    costs = costRes.data || [];
    renderRecords();
    renderCosts();
    setSyncing(false);
  } catch (e) {
    setSyncError(e.message);
  }
}

// ====== 渲染 ======
function renderRecords() {
  const listEl = document.getElementById('recordList');
  const totalCountEl = document.getElementById('totalCount');
  const grandTotalEl = document.getElementById('grandTotal');

  let grandTotal = 0;

  if (records.length === 0) {
    listEl.innerHTML = '<div class="empty-state">还没有记录，记第一单吧 ✍️</div>';
  } else {
    listEl.innerHTML = records.map((r, i) => {
      const price = parseFloat(r.price) || 0;
      grandTotal += price;
      const noteHtml = r.note ? `<div class="record-note">📌 ${r.note}</div>` : '';
      return `
        <div class="record-item">
          <div class="record-info">
            <div class="record-order">第 ${i + 1} 单</div>
            <div class="record-date">📅 ${r.date}</div>
            ${noteHtml}
          </div>
          <div class="record-price">
            ${price.toFixed(2)} 元
            <button class="btn-del" data-id="${r.id}">✕</button>
          </div>
        </div>
      `;
    }).join('');
  }

  totalCountEl.textContent = records.length;
  grandTotalEl.textContent = grandTotal.toFixed(2);

  listEl.querySelectorAll('.btn-del').forEach(btn => {
    btn.addEventListener('click', async function() {
      const id = this.dataset.id;
      if (!confirm('确定删除这条记录？')) return;
      await supabase.from('records').delete().eq('id', id);
      records = records.filter(r => r.id !== id);
      renderRecords();
    });
  });
}

function renderCosts() {
  const listEl = document.getElementById('costList');
  const totalEl = document.getElementById('costTotal');

  let total = 0;
  costs.forEach(c => { total += parseFloat(c.amount) || 0; });
  totalEl.textContent = total.toFixed(2);

  if (costs.length === 0) {
    listEl.innerHTML = '';
    return;
  }

  const showToggle = costs.length > 2;

  listEl.innerHTML = costs.map((c, i) => {
    const amt = parseFloat(c.amount) || 0;
    return `
      <div class="cost-item">
        <input class="cost-input-desc" type="text" value="${escHtml(c.description)}" placeholder="成本项目" data-cid="${c.id}" data-field="desc">
        <input class="cost-input-amount" type="number" value="${amt || ''}" placeholder="金额" min="0" step="0.01" data-cid="${c.id}" data-field="amount">
        <button class="cost-btn-del" data-cid="${c.id}">✕</button>
      </div>
    `;
  }).join('');

  if (showToggle) {
    listEl.classList.add('collapsed');
    if (costExpanded) listEl.classList.remove('collapsed');
    const toggleBtn = document.createElement('button');
    toggleBtn.className = 'cost-toggle-btn';
    toggleBtn.textContent = costExpanded ? '▲ 收起' : `▼ 展开全部（共 ${costs.length} 项）`;
    toggleBtn.addEventListener('click', function() {
      costExpanded = !costExpanded;
      renderCosts();
    });
    listEl.appendChild(toggleBtn);
  } else {
    listEl.classList.remove('collapsed');
    costExpanded = false;
  }

  // 输入监听（防抖同步到云端）
  let timers = {};
  listEl.querySelectorAll('.cost-input-desc, .cost-input-amount').forEach(inp => {
    inp.addEventListener('input', function() {
      const cid = this.dataset.cid;
      const field = this.dataset.field;
      const cost = costs.find(c => c.id === cid);
      if (!cost) return;
      if (field === 'amount') {
        cost.amount = parseFloat(this.value) || 0;
      } else {
        cost.description = this.value;
      }
      // 更新总额
      let t = 0;
      costs.forEach(c => { t += parseFloat(c.amount) || 0; });
      document.getElementById('costTotal').textContent = t.toFixed(2);

      // 防抖同步
      clearTimeout(timers[cid]);
      timers[cid] = setTimeout(async () => {
        await supabase.from('costs').update({ [field]: cost[field] }).eq('id', cid);
      }, 1000);
    });
  });

  // 删除
  listEl.querySelectorAll('.cost-btn-del').forEach(btn => {
    btn.addEventListener('click', async function() {
      const cid = this.dataset.cid;
      await supabase.from('costs').delete().eq('id', cid);
      costs = costs.filter(c => c.id !== cid);
      renderCosts();
    });
  });
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ====== 新增记账 ======
document.getElementById('btnAdd').addEventListener('click', async function() {
  const date = document.getElementById('inputDate').value;
  const price = document.getElementById('inputPrice').value;
  const note = document.getElementById('inputNote').value.trim();

  if (!date) { alert('请选择日期'); return; }
  if (!price || parseFloat(price) <= 0) { alert('请输入有效的价钱'); return; }

  const { data, error } = await supabase.from('records').insert({
    user_id: currentUser.id,
    date,
    price: parseFloat(price),
    note
  }).select();

  if (error) { setSyncError(error.message); return; }

  records.push(data[0]);
  renderRecords();

  document.getElementById('inputPrice').value = '';
  document.getElementById('inputNote').value = '';
  document.getElementById('inputPrice').focus();
});

// ====== 成本 ======
document.getElementById('btnCostToggle').addEventListener('click', function() {
  const isOpen = document.getElementById('costPanel').classList.toggle('open');
  this.classList.toggle('open', isOpen);
  this.textContent = isOpen ? '💰 收起成本' : '💰 成本';
});

document.getElementById('costAddBtn').addEventListener('click', async function() {
  const { data, error } = await supabase.from('costs').insert({
    user_id: currentUser.id,
    description: '',
    amount: 0
  }).select();

  if (error) { setSyncError(error.message); return; }

  costs.push(data[0]);
  renderCosts();
  const items = document.querySelectorAll('.cost-item');
  if (items.length > 0) {
    items[items.length - 1].querySelector('.cost-input-desc').focus();
  }
});

document.getElementById('costClearBtn').addEventListener('click', async function() {
  if (!confirm('确定清空所有成本项？')) return;
  for (const c of costs) {
    await supabase.from('costs').delete().eq('id', c.id);
  }
  costs = [];
  renderCosts();
});

// ====== 清空 / 导出 ======
document.getElementById('btnClearAll').addEventListener('click', async function() {
  if (!confirm('确定要清空全部记录吗？此操作不可撤销。')) return;
  for (const r of records) {
    await supabase.from('records').delete().eq('id', r.id);
  }
  records = [];
  renderRecords();
});

document.getElementById('btnExportCSV').addEventListener('click', function() {
  if (records.length === 0) { alert('没有记录可导出'); return; }
  let csv = '\uFEFF第几单,日期,价钱,备注\n';
  let grandTotal = 0;
  records.forEach((r, i) => {
    grandTotal += parseFloat(r.price) || 0;
    csv += `${i+1},${r.date},${parseFloat(r.price).toFixed(2)},${r.note||''}\n`;
  });
  csv += `合计,,${grandTotal.toFixed(2)},\n`;
  downloadFile(csv, `拍照记账_${new Date().toISOString().slice(0,10)}.csv`, 'text/csv;charset=utf-8');
});

document.getElementById('btnExportTXT').addEventListener('click', function() {
  if (records.length === 0) { alert('没有记录可导出'); return; }
  let txt = '=== 拍照记账 ===\n\n';
  let grandTotal = 0;
  records.forEach((r, i) => {
    const price = parseFloat(r.price) || 0;
    grandTotal += price;
    txt += `第${i+1}单  [${r.date}]  ${price.toFixed(2)}元${r.note ? '  📌 ' + r.note : ''}\n`;
  });
  if (costs.length > 0) {
    txt += '\n--- 成本明细 ---\n';
    let costTotal = 0;
    costs.forEach(c => { costTotal += parseFloat(c.amount) || 0; txt += `  ${c.description||'(未命名)'}：${(parseFloat(c.amount)||0).toFixed(2)}元\n`; });
    txt += `  成本合计：${costTotal.toFixed(2)}元\n`;
  }
  txt += `\n━━━━━━━━━━━━━━━━━━\n`;
  txt += `总单数：${records.length}\n`;
  txt += `总收入：${grandTotal.toFixed(2)} 元\n`;
  txt += `导出时间：${new Date().toLocaleString('zh-CN')}\n`;
  downloadFile(txt, `拍照记账_${new Date().toISOString().slice(0,10)}.txt`, 'text/plain;charset=utf-8');
});

function downloadFile(content, filename, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ====== 键盘快捷键 ======
document.getElementById('inputPrice').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btnAdd').click();
});
document.getElementById('inputNote').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btnAdd').click();
});

document.getElementById('inputDate').value = new Date().toISOString().slice(0, 10);

const { data: { session } } = await supabase.auth.getSession();
if (session) {
  currentUser = session.user;
  userEmail.textContent = session.user.email;
  showPage(appPage);
  loadAllData();
}
