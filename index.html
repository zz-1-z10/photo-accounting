<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>拍照记账</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="拍照记账">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f7fa; color: #1a1a2e; padding: 0; max-width: 640px; margin: 0 auto; }
.page { display: none; padding: 16px; padding-bottom: 80px; }
.page.active { display: block; }
h1 { text-align: center; font-size: 22px; font-weight: 700; color: #16213e; margin: 20px 0 16px; }

/* 登录 */
.auth-container { display: flex; flex-direction: column; justify-content: center; min-height: 90vh; padding: 30px 20px; }
.auth-box { background: #fff; border-radius: 20px; padding: 30px 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
.auth-box .logo { text-align: center; font-size: 48px; margin-bottom: 8px; }
.auth-box .title { text-align: center; font-size: 20px; font-weight: 700; color: #16213e; margin-bottom: 4px; }
.auth-box .subtitle { text-align: center; font-size: 14px; color: #999; margin-bottom: 24px; }
.auth-tabs { display: flex; margin-bottom: 20px; border-radius: 10px; overflow: hidden; border: 1.5px solid #e0e0e0; }
.auth-tab { flex: 1; padding: 10px; text-align: center; font-size: 15px; cursor: pointer; background: #fafafa; color: #999; border: none; }
.auth-tab.active { background: #4361ee; color: #fff; }
.auth-form { display: none; flex-direction: column; gap: 14px; }
.auth-form.active { display: flex; }
.auth-form input { width: 100%; padding: 12px 14px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 16px; font-family: inherit; background: #fafafa; }
.auth-form input:focus { outline: none; border-color: #4361ee; background: #fff; }
.auth-form .btn-auth { width: 100%; padding: 14px; background: linear-gradient(135deg, #4361ee, #3a0ca3); color: #fff; border: none; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; }
.auth-error { background: #fff0f0; color: #e63946; padding: 10px 14px; border-radius: 10px; font-size: 14px; display: none; text-align: center; }
.auth-error.show { display: block; }
.auth-loading { text-align: center; color: #999; font-size: 14px; padding: 20px 0; display: none; }
.auth-success { display: none; text-align: center; color: #2d6a4f; font-size: 15px; padding: 14px 0; background: #edf7f0; border-radius: 10px; }
.auth-success.show { display: block; }

/* 用户栏 */
.user-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; margin: 0 16px; margin-top: 16px; background: #fff; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.04); }
.user-bar .user-email { font-size: 13px; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.user-bar .btn-logout { background: none; border: none; font-size: 13px; color: #e63946; cursor: pointer; padding: 4px 10px; border-radius: 6px; }

/* 表单 */
.form-card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin: 0 16px 16px; }
.form-row { display: flex; gap: 12px; margin-bottom: 12px; }
.form-group { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.form-group label { font-size: 13px; color: #666; font-weight: 500; }
.form-group input { padding: 10px 12px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 16px; background: #fafafa; font-family: inherit; width: 100%; }
.form-group input:focus { outline: none; border-color: #4361ee; background: #fff; }
.form-group textarea { padding: 10px 12px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 16px; background: #fafafa; font-family: inherit; width: 100%; resize: vertical; min-height: 80px; }
.form-group textarea:focus { outline: none; border-color: #4361ee; background: #fff; }
.btn-submit { width: 100%; padding: 14px; background: linear-gradient(135deg, #4361ee, #3a0ca3); color: #fff; border: none; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; }
.btn-submit-sm { padding: 10px 18px; background: linear-gradient(135deg, #4361ee, #3a0ca3); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
.btn-secondary { padding: 10px 18px; background: #f0f0f0; color: #333; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; }
.btn-cost-toggle { width: 100%; padding: 12px; background: none; border: 1.5px dashed #ccc; border-radius: 12px; font-size: 15px; color: #666; cursor: pointer; margin-top: 10px; }
.cost-panel { display: none; border-top: 1px solid #f0f0f0; margin-top: 12px; padding-top: 12px; }
.cost-panel.open { display: block; }
.cost-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.cost-header .cost-total-amount { font-size: 18px; font-weight: 700; color: #e63946; }
.cost-btn-clear { background: none; border: none; font-size: 12px; color: #bbb; cursor: pointer; }
.cost-list { display: flex; flex-direction: column; gap: 6px; }
.cost-item { display: flex; gap: 8px; align-items: center; }
.cost-item input { padding: 8px 10px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px; background: #fafafa; font-family: inherit; }
.cost-item .cost-input-desc { flex: 3; width: 0; min-width: 0; }
.cost-item .cost-input-amount { flex: 1.2; width: 0; min-width: 0; }
.cost-item .cost-btn-del { background: none; border: none; font-size: 16px; color: #ccc; cursor: pointer; }
.cost-add-row { margin-top: 6px; padding: 8px; background: none; border: 1px dashed #ddd; border-radius: 8px; font-size: 13px; color: #999; cursor: pointer; width: 100%; }
.cost-list.collapsed .cost-item:nth-child(n+3) { display: none; }
.cost-toggle-btn { display: block; width: 100%; text-align: center; padding: 6px; font-size: 13px; color: #999; background: none; border: none; cursor: pointer; }

/* 统计 */
.stats-bar { display: flex; justify-content: space-around; background: linear-gradient(135deg, #16213e, #1a1a2e); color: #fff; border-radius: 14px; padding: 16px 20px; margin: 0 16px 16px; }
.stat-item { text-align: center; }
.stat-label { font-size: 12px; opacity: 0.7; }
.stat-value { font-size: 22px; font-weight: 700; margin-top: 2px; }

/* 列表 */
.list-header { display: flex; justify-content: space-between; align-items: center; margin: 0 16px 10px; }
.list-header h2 { font-size: 16px; color: #333; }
.btn-clear { background: none; border: none; font-size: 13px; color: #e63946; cursor: pointer; }
.date-group { margin: 0 16px; }
.date-group + .date-group { margin-top: 12px; }
.date-header { background: #fff; border-radius: 12px 12px 0 0; padding: 10px 16px 8px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 600; color: #16213e; border-bottom: 1px solid #f0f0f0; }
.date-header .date-total { font-size: 15px; color: #2d6a4f; }
.date-records { background: #fff; border-radius: 0 0 12px 12px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
.date-records .record-item { padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f5f5f5; }
.date-records .record-item:last-child { border-bottom: none; }
.record-item .record-num { font-size: 12px; color: #4361ee; font-weight: 600; background: #eef1ff; padding: 1px 8px; border-radius: 10px; }
.record-item .record-note-text { font-size: 13px; color: #999; margin-left: 8px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.record-item .record-price-text { font-size: 16px; font-weight: 700; color: #2d6a4f; }
.record-item .btn-del { background: none; border: none; font-size: 16px; color: #ccc; cursor: pointer; margin-left: 6px; }
.empty-state { text-align: center; color: #aaa; padding: 40px 0; font-size: 15px; margin: 0 16px; }

/* 导入弹窗 */
.import-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 100; padding: 20px 16px; }
.import-modal.open { display: block; }
.import-modal .modal-box { background: #fff; border-radius: 16px; padding: 20px; max-width: 640px; margin: 20px auto; }
.import-modal h3 { font-size: 16px; color: #16213e; margin-bottom: 10px; display: flex; justify-content: space-between; }
.import-modal .close-btn { background: none; border: none; font-size: 20px; color: #999; cursor: pointer; }
.import-hint { font-size: 13px; color: #888; background: #f8f9fc; border-radius: 8px; padding: 10px 12px; margin-bottom: 12px; line-height: 1.7; }
.import-hint code { background: #eef1ff; color: #4361ee; padding: 1px 5px; border-radius: 4px; font-size: 12px; }
.import-actions { display: flex; gap: 10px; margin-top: 10px; }

/* 文本弹窗 */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 100; padding: 20px 16px 60px; overflow-y: auto; }
.modal-overlay.open { display: block; }
.modal-content { background: #fff; border-radius: 16px; padding: 20px; max-width: 640px; margin: 20px auto; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.modal-header h3 { font-size: 18px; color: #16213e; }
.modal-close { background: none; border: none; font-size: 22px; color: #999; cursor: pointer; }
.text-view { font-size: 14px; line-height: 1.8; color: #333; white-space: pre-wrap; font-family: monospace; }

.sync-bar { text-align: center; font-size: 12px; color: #bbb; padding: 4px 0 0; margin: 0 16px; }
.toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #eee; padding: 8px 16px; padding-bottom: max(8px, env(safe-area-inset-bottom)); display: flex; gap: 10px; max-width: 640px; margin: 0 auto; align-items: center; }
.toolbar button { padding: 12px; border: 1.5px solid #e0e0e0; border-radius: 10px; background: #fff; font-size: 14px; color: #333; cursor: pointer; }
.toolbar button:active { background: #f5f5f5; }
.toolbar .btn-small { padding: 8px 10px; font-size: 12px; flex: 0 0 auto; color: #4361ee; border-color: #4361ee; }
.toolbar .btn-text { flex: 1; color: #2d6a4f; border-color: #2d6a4f; }
</style>
</head>
<body>

<div id="authPage" class="page active">
  <div class="auth-container">
    <div class="auth-box">
      <div class="logo">📸</div>
      <div class="title">拍照记账</div>
      <div class="subtitle">登录后数据自动同步到云端</div>
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin">登录</button>
        <button class="auth-tab" id="tabRegister">注册</button>
      </div>
      <div id="loginForm" class="auth-form active">
        <div class="auth-error" id="loginError"></div>
        <input type="email" id="loginEmail" placeholder="邮箱">
        <input type="password" id="loginPassword" placeholder="密码">
        <button class="btn-auth" id="loginBtn">登录</button>
        <div class="auth-loading" id="loginLoading">登录中...</div>
      </div>
      <div id="registerForm" class="auth-form">
        <div class="auth-error" id="registerError"></div>
        <div class="auth-success" id="registerSuccess">✅ 注册成功！请在登录页登录</div>
        <input type="email" id="regEmail" placeholder="邮箱">
        <input type="password" id="regPassword" placeholder="密码（至少6位）">
        <button class="btn-auth" id="registerBtn">注册</button>
        <div class="auth-loading" id="registerLoading">注册中...</div>
      </div>
    </div>
  </div>
</div>

<div id="appPage" class="page">
  <div class="user-bar">
    <span class="user-email" id="userEmail"></span>
    <button class="btn-logout" id="logoutBtn">退出</button>
  </div>
  <div class="form-card" style="margin-top:12px">
    <div class="form-row">
      <div class="form-group"><label>📅 日期</label><input type="date" id="inputDate"></div>
      <div class="form-group"><label>💰 价钱（元）</label><input type="number" id="inputPrice" placeholder="这单多少钱" min="0" step="0.01"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>📝 备注（可选）</label><input type="text" id="inputNote" placeholder="比如：张三、婚礼跟拍..."></div>
    </div>
    <button class="btn-submit" id="btnAdd">➕ 记一单</button>
    <button class="btn-cost-toggle" id="costToggle">💰 成本</button>
    <div class="cost-panel" id="costPanel">
      <div class="cost-header">
        <span>总成本</span>
        <span><button class="cost-btn-clear" id="clearCostsBtn">清空</button> <span class="cost-total-amount" id="costTotal">0.00</span> 元</span>
      </div>
      <div class="cost-list" id="costList"></div>
      <button class="cost-add-row" id="addCostBtn">➕ 添加一项</button>
    </div>
  </div>
  <div class="sync-bar" id="syncBar">☁️ 数据已同步到云端</div>
  <div class="stats-bar">
    <div class="stat-item"><div class="stat-label">总单数</div><div class="stat-value" id="totalCount">0</div></div>
    <div class="stat-item"><div class="stat-label">总金额（元）</div><div class="stat-value" id="grandTotal">0.00</div></div>
  </div>
  <div class="list-header">
    <h2>📋 每单明细</h2>
    <button class="btn-clear" id="clearAllBtn">清空</button>
  </div>
  <div id="recordContainer"></div>
</div>

<div class="import-modal" id="importModal">
  <div class="modal-box">
    <h3>📥 批量导入 <button class="close-btn" id="closeImportBtn">✕</button></h3>
    <div class="import-hint">
      支持格式（每行一条）：<br>
      📌 <code>2026/03/17-第1单-金额：50.</code><br>
      📌 <code>2026/03~05-第2单-金额：50.</code><br>
      📌 <code>2026-01-01 100 张三</code>
    </div>
    <textarea id="importText" rows="6" style="width:100%;padding:10px 12px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:16px;font-family:inherit;background:#fafafa;resize:vertical;min-height:80px" placeholder="把旧账本粘贴到这里..."></textarea>
    <div class="import-actions">
      <button class="btn-submit-sm" id="doImportBtn">🔍 识别并导入</button>
      <button class="btn-secondary" id="cancelImportBtn">取消</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="textModal">
  <div class="modal-content">
    <div class="modal-header"><h3>📄 账本文本形式</h3><button class="modal-close" id="closeTextBtn">✕</button></div>
    <div class="text-view" id="textViewContent"></div>
  </div>
</div>

<div class="toolbar" id="toolbar" style="display:none">
  <button class="btn-small" id="openImportBtn">📥导入</button>
  <button class="btn-text" id="openTextBtn">📄 查看文本形式</button>
</div>

<script>
// ====== 配置 ======
const SB_URL = 'https://ekqbzemiumadjknhqhfm.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVrcWJ6ZW1pdW1hZGprbmhxaGZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NTM5OTEsImV4cCI6MjA5NjEyOTk5MX0.7im4Y2tEypBVCriHqwf5-S91m-b6AwmDMumc2cu0Vsc';
const REST = SB_URL + '/rest/v1';
const AUTH = SB_URL + '/auth/v1';

let user = null;
let token = null;
let records = [];
let costs = [];
let costOpen = false;
let costExpand = false;
let costTimers = {};

function $(id) { return document.getElementById(id); }

function apiHeaders() {
  const h = { 'apikey': SB_KEY, 'Content-Type': 'application/json' };
  if (token) h['Authorization'] = 'Bearer ' + token;
  return h;
}

async function api(method, url, body) {
  var opt = { method: method, headers: apiHeaders() };
  if (body) {
    opt.body = JSON.stringify(body);
    if (method === 'POST') opt.headers['Prefer'] = 'return=representation';
  }
  var res = await fetch(url, opt);
  if (res.status === 204) return null;
  try {
    var data = await res.json();
    if (!res.ok) throw new Error(data.message || data.error_description || data.msg || '请求失败');
    return data;
  } catch (e) {
    if (res.ok) return null; // 空响应也算成功
    throw e;
  }
}

// 日期排序键
function dateKey(d) {
  if (!d) return '9';
  let m = d.match(/^(\d{4})[-\/\.](\d{1,2})[-\/\.](\d{1,2})/);
  if (m) return m[1] + '-' + m[2].padStart(2,'0') + '-' + m[3].padStart(2,'0');
  m = d.match(/^(\d{4})[-\/\.](\d{1,2})/);
  if (m) return m[1] + '-' + m[2].padStart(2,'0') + '-00';
  return d;
}

// 页面切换
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  $(pageId).classList.add('active');
  $('toolbar').style.display = pageId === 'appPage' ? 'flex' : 'none';
}

function setSync(text) {
  $('syncBar').textContent = text || '☁️ 数据已同步到云端';
}

// ====== 登录相关 ======
$('tabLogin').onclick = function() {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  this.classList.add('active');
  document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
  $('loginForm').classList.add('active');
  document.querySelectorAll('.auth-error').forEach(e => e.classList.remove('show'));
  $('registerSuccess').classList.remove('show');
};

$('tabRegister').onclick = function() {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  this.classList.add('active');
  document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
  $('registerForm').classList.add('active');
  document.querySelectorAll('.auth-error').forEach(e => e.classList.remove('show'));
  $('registerSuccess').classList.remove('show');
};

$('loginBtn').onclick = async function() {
  const email = $('loginEmail').value.trim();
  const password = $('loginPassword').value;
  if (!email || !password) { $('loginError').textContent = '请输入邮箱和密码'; $('loginError').classList.add('show'); return; }
  this.disabled = true;
  $('loginLoading').style.display = 'block';
  $('loginError').classList.remove('show');
  try {
    const data = await api('POST', AUTH + '/token?grant_type=password', { email: email, password: password });
    user = data.user;
    token = data.access_token;
    localStorage.setItem('t', data.access_token);
    localStorage.setItem('u', JSON.stringify(data.user));
    enterApp();
  } catch (e) {
    $('loginError').textContent = e.message.includes('Invalid') ? '邮箱或密码错误' : e.message;
    $('loginError').classList.add('show');
  }
  this.disabled = false;
  $('loginLoading').style.display = 'none';
};

$('registerBtn').onclick = async function() {
  const email = $('regEmail').value.trim();
  const password = $('regPassword').value;
  if (!email || !password) { $('registerError').textContent = '请输入邮箱和密码'; $('registerError').classList.add('show'); return; }
  if (password.length < 6) { $('registerError').textContent = '密码至少6位'; $('registerError').classList.add('show'); return; }
  this.disabled = true;
  $('registerLoading').style.display = 'block';
  $('registerError').classList.remove('show');
  try {
    await api('POST', AUTH + '/signup', { email: email, password: password });
    $('registerSuccess').classList.add('show');
    this.textContent = '注册成功 ✓';
  } catch (e) {
    $('registerError').textContent = e.message;
    $('registerError').classList.add('show');
  }
  this.disabled = false;
  $('registerLoading').style.display = 'none';
};

$('logoutBtn').onclick = async function() {
  try { await api('POST', AUTH + '/logout'); } catch (e) {}
  user = null;
  token = null;
  localStorage.removeItem('t');
  localStorage.removeItem('u');
  showPage('authPage');
};

async function enterApp() {
  showPage('appPage');
  $('userEmail').textContent = user.email;
  $('inputDate').value = new Date().toISOString().slice(0, 10);
  await loadData();
}

// ====== 数据加载 ======
async function loadData() {
  setSync('⏳ 同步中...');
  try {
    const [recData, costData] = await Promise.all([
      api('GET', REST + '/records?user_id=eq.' + user.id + '&order=created_at.asc'),
      api('GET', REST + '/costs?user_id=eq.' + user.id + '&order=created_at.asc')
    ]);
    records = recData || [];
    costs = costData || [];
    renderRecords();
    renderCosts();
    setSync('☁️ 数据已同步到云端');
  } catch (e) {
    setSync('⚠️ ' + e.message);
  }
}

// ====== 渲染记录（按日期排序并分组）=====
var showAllRecords = false;

function renderRecords() {
  var container = $('recordContainer');
  if (records.length === 0) {
    container.innerHTML = '<div class="empty-state">还没有记录，记第一单吧 ✍️</div>';
    $('totalCount').textContent = '0';
    $('grandTotal').textContent = '0.00';
    return;
  }

  // 按日期排序（升序用于分配序号，降序用于展示）
  var sorted = records.slice().sort(function(a, b) {
    return dateKey(a.date) > dateKey(b.date) ? 1 : -1;
  });

  // 按日期分组
  var groups = {};
  sorted.forEach(function(r, i) {
    var d = r.date || '未知日期';
    if (!groups[d]) groups[d] = [];
    groups[d].push({ id: r.id, date: r.date, price: r.price, note: r.note, seq: i + 1 });
  });

  // 日期列表（降序：最新在上）
  var dateList = Object.keys(groups).sort(function(a, b) {
    return dateKey(a) < dateKey(b) ? 1 : -1; // 降序
  });

  var grandTotal = 0;
  var html = '';
  var showCount = showAllRecords ? dateList.length : Math.min(2, dateList.length);

  for (var di = 0; di < dateList.length; di++) {
    var date = dateList[di];
    var items = groups[date];
    var dayTotal = 0;
    for (var ii = 0; ii < items.length; ii++) {
      dayTotal += parseFloat(items[ii].price) || 0;
      grandTotal += parseFloat(items[ii].price) || 0;
    }

    // 只渲染前 showCount 天，剩下的隐藏
    var style = di < showCount ? '' : ' style="display:none"';
    html += '<div class="date-group"' + style + '>' +
      '<div class="date-header"><span>📅 ' + date + '</span><span class="date-total">' + dayTotal.toFixed(2) + ' 元</span></div>' +
      '<div class="date-records">';

    for (var ii = 0; ii < items.length; ii++) {
      var r = items[ii];
      var p = parseFloat(r.price) || 0;
      var noteHtml = r.note ? '<span class="record-note-text">📌 ' + escHtml(r.note) + '</span>' : '';
      html += '<div class="record-item">' +
        '<div><span class="record-num">第 ' + r.seq + ' 单</span>' + noteHtml + '</div>' +
        '<div><span class="record-price-text">' + p.toFixed(2) + ' 元</span>' +
        '<button class="btn-del" onclick="deleteRecord(\'' + r.id + '\')">✕</button></div>' +
        '</div>';
    }
    html += '</div></div>';
  }

  // 展开/收起按钮
  if (dateList.length > 2) {
    html += '<div style="text-align:center;margin:10px 16px 0">' +
      '<button class="btn-secondary" id="toggleAllBtn" onclick="toggleAllRecords()" style="padding:8px 20px;font-size:14px;border-radius:10px;border:1.5px solid #4361ee;color:#4361ee;background:#fff;cursor:pointer">' +
      (showAllRecords ? '▲ 收起' : '▼ 展开全部明细') +
      '</button></div>';
  }

  container.innerHTML = html;
  $('totalCount').textContent = records.length;
  $('grandTotal').textContent = grandTotal.toFixed(2);
}

function toggleAllRecords() {
  showAllRecords = !showAllRecords;
  renderRecords();
}

async function deleteRecord(id) {
  if (!confirm('确定删除？')) return;
  await api('DELETE', REST + '/records?id=eq.' + id);
  records = records.filter(function(r) { return r.id !== id; });
  renderRecords();
}

// ====== 新增记录 ======
$('btnAdd').onclick = async function() {
  var date = $('inputDate').value;
  var price = $('inputPrice').value;
  var note = $('inputNote').value.trim();
  if (!date) { alert('请选择日期'); return; }
  if (!price || parseFloat(price) <= 0) { alert('请输入有效的价钱'); return; }

  var result = await api('POST', REST + '/records', {
    user_id: user.id,
    date: date,
    price: parseFloat(price),
    note: note
  });
  // 处理可能返回数组的情况
  if (Array.isArray(result) && result.length > 0) {
    records.push(result[0]);
  } else if (result) {
    records.push(result);
  }
  renderRecords();
  $('inputPrice').value = '';
  $('inputNote').value = '';
  $('inputPrice').focus();
};

$('clearAllBtn').onclick = async function() {
  if (!confirm('确定清空全部记录？')) return;
  for (var i = 0; i < records.length; i++) {
    await api('DELETE', REST + '/records?id=eq.' + records[i].id);
  }
  records = [];
  renderRecords();
};

// ====== 成本 ======
$('costToggle').onclick = function() {
  costOpen = !costOpen;
  $('costPanel').classList.toggle('open', costOpen);
  this.classList.toggle('open', costOpen);
  this.textContent = costOpen ? '💰 收起成本' : '💰 成本';
};

$('addCostBtn').onclick = async function() {
  // 先在本地添加，再后台同步（不卡界面）
  var tempId = 'temp_' + Date.now();
  costs.push({ id: tempId, description: '', amount: 0 });
  renderCosts();
  // 自动聚焦新行
  setTimeout(function() {
    var items = document.querySelectorAll('.cost-item');
    if (items.length > 0) items[items.length - 1].querySelector('.cost-input-desc').focus();
  }, 100);

  try {
    var result = await api('POST', REST + '/costs', { user_id: user.id, description: '', amount: 0 });
    // 把临时 id 换成真实 id
    for (var i = 0; i < costs.length; i++) {
      if (costs[i].id === tempId) {
        costs[i].id = result.id;
        break;
      }
    }
  } catch (e) {}
};

$('clearCostsBtn').onclick = async function() {
  if (!confirm('确定清空所有成本项？')) return;
  for (var i = 0; i < costs.length; i++) {
    await api('DELETE', REST + '/costs?id=eq.' + costs[i].id);
  }
  costs = [];
  renderCosts();
};

function renderCosts() {
  var el = $('costList');
  var total = 0;
  for (var i = 0; i < costs.length; i++) {
    total += parseFloat(costs[i].amount) || 0;
  }
  $('costTotal').textContent = total.toFixed(2);

  if (costs.length === 0) {
    el.innerHTML = '';
    return;
  }

  var showToggle = costs.length > 2;
  var html = '';
  for (var i = 0; i < costs.length; i++) {
    var c = costs[i];
    var amt = parseFloat(c.amount) || 0;
    var desc = escHtml(c.description || '');
    html += '<div class="cost-item">' +
      '<input class="cost-input-desc" type="text" value="' + desc + '" placeholder="成本项目" data-cid="' + c.id + '" data-field="desc" oninput="costEdit(this)">' +
      '<input class="cost-input-amount" type="number" value="' + (amt || '') + '" placeholder="金额" min="0" step="0.01" data-cid="' + c.id + '" data-field="amount" oninput="costEdit(this)">' +
      '<button class="cost-btn-del" onclick="deleteCost(\'' + c.id + '\')">✕</button>' +
      '</div>';
  }
  el.innerHTML = html;

  if (showToggle) {
    el.classList.add('collapsed');
    if (costExpand) el.classList.remove('collapsed');
    var tb = document.createElement('button');
    tb.className = 'cost-toggle-btn';
    tb.textContent = costExpand ? '▲ 收起' : '▼ 展开全部（共 ' + costs.length + ' 项）';
    tb.onclick = function() { costExpand = !costExpand; renderCosts(); };
    el.appendChild(tb);
  } else {
    el.classList.remove('collapsed');
    costExpand = false;
  }
}

function costEdit(inp) {
  var id = inp.dataset.cid;
  var field = inp.dataset.field;
  // 找到对应成本项
  var cost = null;
  for (var i = 0; i < costs.length; i++) {
    if (costs[i].id === id) { cost = costs[i]; break; }
  }
  if (!cost) return;

  if (field === 'amount') {
    cost.amount = parseFloat(inp.value) || 0;
  } else {
    cost.description = inp.value;
  }

  // 更新总额
  var total = 0;
  for (var i = 0; i < costs.length; i++) {
    total += parseFloat(costs[i].amount) || 0;
  }
  $('costTotal').textContent = total.toFixed(2);

  // 防抖同步到云端
  if (costTimers[id]) clearTimeout(costTimers[id]);
  costTimers[id] = setTimeout(function() {
    var updateData = {};
    updateData[field] = cost[field];
    api('PATCH', REST + '/costs?id=eq.' + id, updateData).catch(function() {});
  }, 1000);
}

async function deleteCost(id) {
  if (!confirm('确定删除这项成本？')) return;
  await api('DELETE', REST + '/costs?id=eq.' + id);
  costs = costs.filter(function(c) { return c.id !== id; });
  renderCosts();
}

// ====== 文本查看 ======
$('openTextBtn').onclick = function() {
  var txt = '=== 拍照记账 ===\n';

  if (costs.length > 0) {
    txt += '\n--- 成本 ---\n';
    var costTotal = 0;
    for (var i = 0; i < costs.length; i++) {
      var a = parseFloat(costs[i].amount) || 0;
      costTotal += a;
      txt += '  ' + (costs[i].description || '(未命名)') + '：' + a.toFixed(2) + '元\n';
    }
    txt += '  成本合计：' + costTotal.toFixed(2) + '元\n';
  }

  var grandTotal = 0;
  for (var i = 0; i < records.length; i++) {
    grandTotal += parseFloat(records[i].price) || 0;
  }
  txt += '\n总单数：' + records.length + '\n总金额：' + grandTotal.toFixed(2) + ' 元\n\n';

  // 按日期分组
  var sorted = records.slice().sort(function(a, b) {
    return dateKey(a.date) > dateKey(b.date) ? 1 : -1;
  });
  var groups = {};
  for (var i = 0; i < sorted.length; i++) {
    var d = sorted[i].date || '未知日期';
    if (!groups[d]) groups[d] = [];
    groups[d].push(sorted[i]);
  }
  var dateList = Object.keys(groups).sort(function(a, b) {
    return dateKey(a) > dateKey(b) ? 1 : -1;
  });

  for (var di = 0; di < dateList.length; di++) {
    var date = dateList[di];
    var items = groups[date];
    var dayTotal = 0;
    for (var ii = 0; ii < items.length; ii++) {
      dayTotal += parseFloat(items[ii].price) || 0;
    }
    txt += '📅 ' + date + '  —  ' + dayTotal.toFixed(2) + '元\n';

    var seqOffset = 0;
    for (var pi = 0; pi < di; pi++) {
      seqOffset += groups[dateList[pi]].length;
    }

    for (var ii = 0; ii < items.length; ii++) {
      var seq = seqOffset + ii + 1;
      txt += '  第' + seq + '单  ' + (parseFloat(items[ii].price) || 0).toFixed(2) + '元';
      if (items[ii].note) txt += '  📌 ' + items[ii].note;
      txt += '\n';
    }
  }

  $('textViewContent').textContent = txt;
  $('textModal').classList.add('open');
};

$('closeTextBtn').onclick = function() {
  $('textModal').classList.remove('open');
};
$('textModal').onclick = function(e) {
  if (e.target === this) $('textModal').classList.remove('open');
};

// ====== 导入 ======
$('openImportBtn').onclick = function() {
  $('importModal').classList.add('open');
  $('importText').value = '';
};
$('closeImportBtn').onclick = function() { $('importModal').classList.remove('open'); };
$('cancelImportBtn').onclick = function() { $('importModal').classList.remove('open'); };

$('doImportBtn').onclick = async function() {
  var text = $('importText').value;
  if (!text.trim()) { alert('请粘贴数据'); return; }

  var lines = text.split('\n');
  var items = [];

  for (var li = 0; li < lines.length; li++) {
    var line = lines[li].trim();
    if (!line) continue;
    if (/^(日期|date|单价|小计|合计|━━|===|#)/i.test(line)) continue;
    if (/^[─═━=]+$/.test(line)) continue;

    var date = '', price = 0, note = '', m;

    // 格式1: 2026/03/17-第1单-金额：50.
    m = line.match(/^(\S+?)\s*-\s*第\d+单\s*-\s*金额[：:]\s*(\d+(?:\.\d+)?)\s*\.?\s*$/);
    if (m) { date = m[1]; price = parseFloat(m[2]); }
    else {
      // 格式2: 带备注
      m = line.match(/^(\S+?)\s*-\s*第\d+单\s*-\s*金额[：:]\s*(\d+(?:\.\d+)?)\s*\.?\s*[-—](.+)$/);
      if (m) { date = m[1]; price = parseFloat(m[2]); note = m[3].trim(); }
      else {
        // 格式3: 2026-01-01 100 张三
        m = line.match(/^(\d{4})[-\/\.](\d{1,2})[-\/\.](\d{1,2})\s+(\d+(?:\.\d+)?)\s*(.*?)$/);
        if (m) {
          date = m[1] + '-' + m[2].padStart(2,'0') + '-' + m[3].padStart(2,'0');
          price = parseFloat(m[4]);
          note = m[5].trim();
        }
        else {
          // 格式4: CSV
          m = line.match(/^(\d{4})[-\/\.](\d{1,2})[-\/\.](\d{1,2})\s*[,，]\s*(\d+(?:\.\d+)?)\s*(?:[,，]\s*(.*?))?$/);
          if (m) {
            date = m[1] + '-' + m[2].padStart(2,'0') + '-' + m[3].padStart(2,'0');
            price = parseFloat(m[4]);
            note = (m[5] || '').trim();
          }
        }
      }
    }
    if (date && price > 0) {
      // 处理 ~ 日期：2026/03~05 → 转为 2026-03-01
      if (date.indexOf('~') !== -1) {
        var parts = date.split('~');
        date = parts[0].replace(/[/\.]/g, '-');
        // 补全到 YYYY-MM-01
        if (date.match(/^\d{4}-\d{1,2}$/)) date = date + '-01';
      } else {
        date = date.replace(/[/\.]/g, '-');
        // 补全到 YYYY-MM-DD
        var dm = date.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
        if (!dm) {
          dm = date.match(/^(\d{4})-(\d{1,2})$/);
          if (dm) date = dm[1] + '-' + dm[2].padStart(2,'0') + '-01';
        }
      }
      items.push({ date: date, price: price, note: note });
    }
  }

  if (items.length === 0) { alert('未能识别出有效数据。请检查格式。'); return; }
  if (!confirm('识别到 ' + items.length + ' 条记录，确认导入？')) return;

  setSync('⏳ 正在导入 ' + items.length + ' 条...');
  var ok = 0, err = 0;

  for (var ii = 0; ii < items.length; ii++) {
    try {
      var item = items[ii];
      var result = await api('POST', REST + '/records', {
        user_id: user.id,
        date: item.date,
        price: item.price,
        note: item.note || ''
      });
      if (Array.isArray(result) && result.length > 0) {
        records.push(result[0]);
      } else if (result) {
        records.push(result);
      }
      ok++;
    } catch (e) {
      err++;
    }
  }

  // 按日期重新排序
  records.sort(function(a, b) {
    return dateKey(a.date) > dateKey(b.date) ? 1 : -1;
  });

  renderRecords();
  $('importModal').classList.remove('open');

  var msg = '✅ 成功导入 ' + ok + ' 条记录！';
  if (err > 0) msg += '\n失败 ' + err + ' 条（可能已有重复）';
  setSync('☁️ 导入完成：成功 ' + ok + ' 条' + (err > 0 ? '，失败 ' + err + ' 条' : ''));
  if (ok > 0) alert(msg);
};

// ====== 工具函数 ======
function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// 回车提交
$('inputPrice').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') $('btnAdd').click();
});
$('inputNote').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') $('btnAdd').click();
});

// ====== 初始化 ======
document.addEventListener('DOMContentLoaded', function() {
  $('inputDate').value = new Date().toISOString().slice(0, 10);

  // 检查是否有保存的登录信息
  var savedToken = localStorage.getItem('t');
  var savedUser = localStorage.getItem('u');
  if (savedToken && savedUser) {
    token = savedToken;
    user = JSON.parse(savedUser);
    enterApp();
  }
});
</script>
